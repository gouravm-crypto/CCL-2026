<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCL Master Intelligence — Jan 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
<style>
:root {
  --gold: #C9A84C; --gold-light: #F0D080; --dark: #1A1208; --dark2: #2C1F0A;
  --green: #2D7A4F; --red: #C0392B; --gray: #6B6B6B; --bg: #FDFAF4; --white: #FFFFFF;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--dark); }

.nav-tabs { display: flex; background: var(--dark2); justify-content: center; position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid var(--gold); overflow-x: auto; }
.nav-tab { padding: 18px 25px; color: rgba(240,208,128,0.6); cursor: pointer; font-weight: 700; text-transform: uppercase; font-size: 11px; white-space: nowrap; transition: 0.3s; }
.nav-tab.active { color: var(--gold-light); border-bottom: 3px solid var(--gold); background: rgba(255,255,255,0.05); }

.main { padding: 30px; max-width: 1400px; margin: 0 auto; }
.section { display: none; }
.section.active { display: block; animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.controls { display: flex; gap: 15px; margin-bottom: 25px; align-items: center; flex-wrap: wrap; }
.search-box { flex: 1; padding: 14px; border-radius: 10px; border: 1px solid #ddd; min-width: 250px; font-size: 14px; }
.btn-action { background: var(--green); color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px; }

.table-wrap { background: white; border-radius: 15px; border: 1px solid #E8DCC8; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.05); overflow-x: auto; }
table { width: 100%; border-collapse: collapse; min-width: 1000px; }
th { background: var(--dark2); color: var(--gold-light); padding: 18px; text-align: left; font-size: 10px; text-transform: uppercase; cursor: pointer; }
td { padding: 16px 18px; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
tr:hover { background: #fcfaf5; }

.chart-card { background: white; padding: 25px; border-radius: 15px; border: 1px solid #E8DCC8; height: 500px; display: flex; flex-direction: column; margin-bottom: 25px; box-shadow: 0 4px 24px rgba(0,0,0,0.05); }
.btn-save { background: var(--dark); color: var(--gold-light); padding: 6px 12px; border-radius: 5px; font-size: 10px; cursor: pointer; border: none; margin-left: auto; margin-bottom: 10px; }
</style>
</head>
<body>

<div class="nav-tabs">
    <div class="nav-tab active" onclick="switchTab(event, 'summary')">Executive Summary</div>
    <div class="nav-tab" onclick="switchTab(event, 'board')">Global Scoreboard</div>
    <div class="nav-tab" onclick="switchTab(event, 'km_deep')">Kano Model (KM) Deep-Dive</div>
    <div class="nav-tab" onclick="switchTab(event, 'nps_deep')">NPS Intelligence</div>
</div>

<div class="main">
    <div id="tab-summary" class="section active">
        <div class="chart-card">
            <button class="btn-save" onclick="saveChart('lineChart')">📸 Save Trends</button>
            <div style="flex:1;"><canvas id="lineChart"></canvas></div>
        </div>
        <div class="chart-card">
            <button class="btn-save" onclick="saveChart('distChart')">📸 Save Distribution</button>
            <div style="flex:1;"><canvas id="distChart"></canvas></div>
        </div>
    </div>

    <div id="tab-board" class="section">
        <div class="controls">
            <input type="text" id="searchBoard" class="search-box" placeholder="Search Region, Store, or Code..." oninput="filterBoard()">
            <button class="btn-action" onclick="exportData('board')">📥 Export Global CSV</button>
        </div>
        <div class="table-wrap"><table id="tableBoard"><thead></thead><tbody id="bodyBoard"></tbody></table></div>
    </div>

    <div id="tab-km_deep" class="section">
        <div class="controls">
            <input type="text" id="searchKM" class="search-box" placeholder="Filter KM Data by Region..." oninput="filterMetric('KM')">
            <button class="btn-action" onclick="exportData('KM')">📥 Export KM Analytics</button>
        </div>
        <div class="table-wrap"><table><thead><tr><th onclick="sortMetric('KM', 0)">Rank</th><th>Store Name</th><th>Region</th><th onclick="sortMetric('KM', 4)">KM Score ↕</th><th>Status</th></tr></thead><tbody id="bodyKM"></tbody></table></div>
    </div>

    <div id="tab-nps_deep" class="section">
        <div class="controls">
            <input type="text" id="searchNPS" class="search-box" placeholder="Filter NPS Data by Region..." oninput="filterMetric('NPS')">
            <button class="btn-action" onclick="exportData('NPS')">📥 Export NPS Analytics</button>
        </div>
        <div class="table-wrap"><table><thead><tr><th onclick="sortMetric('NPS', 0)">Rank</th><th>Store Name</th><th>Region</th><th onclick="sortMetric('NPS', 4)">NPS Score ↕</th><th>Status</th></tr></thead><tbody id="bodyNPS"></tbody></table></div>
    </div>
</div>

<script>
Chart.register(ChartDataLabels);

// --- PASTE YOUR FULL 350+ STORE DATASET HERE ---
const MASTER_DATA = [
    ["CFKNGDSR","KNGDSR","Kangra-Dharamshala","NPJK",100,25,25,20,15,true],
    ["CFKTNJBR","KTNJBR","KTN-Jabalpur Road","WMP",100,25,25,20,15,true],
    ["CRPATCCM","PATCCM","PAT City Center","EBJ",100,25,25,20,null,true],
    ["CLMUMMLD","MUMMLD","MUM-Mulund","WMUM1",99,25,25,19,15,true]
    // ... PASTE REMAINING ROWS ...
];

let filteredBoard = [...MASTER_DATA];
let filteredKM = [...MASTER_DATA];
let filteredNPS = [...MASTER_DATA];

function switchTab(e, id) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-'+id).classList.add('active');
    e.target.classList.add('active');
    if(id === 'summary') initCharts();
}

// METRIC FILTERING LOGIC
function filterMetric(type) {
    const q = document.getElementById('search'+type).value.toLowerCase();
    const data = MASTER_DATA.filter(s => s[3].toLowerCase().includes(q) || s[2].toLowerCase().includes(q));
    if(type === 'KM') { filteredKM = data; renderMetric('KM', 8); }
    else { filteredNPS = data; renderMetric('NPS', 5); }
}

function renderMetric(type, colIndex) {
    const body = document.getElementById('body'+type);
    const data = type === 'KM' ? filteredKM : filteredNPS;
    // Sort High to Low by default
    data.sort((a,b) => (b[colIndex]||0) - (a[colIndex]||0));
    body.innerHTML = data.map((s,i) => `
        <tr><td>${i+1}</td><td><strong>${s[2]}</strong></td><td>${s[3]}</td>
        <td style="font-weight:900; color:var(--green);">${s[colIndex]||'NA'}</td>
        <td>${s[colIndex] >= (colIndex===8?14:24)?'🌟 Top Performer':'✅ Eligible'}</td></tr>`).join('');
}

// Fix Chart Alignment & Labels
function initCharts() {
    const opts = {
        responsive: true, maintainAspectRatio: false,
        layout: { padding: { top: 30 } }, // Give room for labels
        plugins: {
            datalabels: {
                display: true, color: '#1A1208', font: { weight: 'bold', size: 11 },
                offset: 5, align: 'top', anchor: 'end' // Perfect top alignment
            }
        }
    };
    new Chart(document.getElementById('lineChart'), {
        type: 'line',
        data: { labels: ['SAP','EBJ','EOC','NPJK','NUP2'], datasets: [{ label:'Jan', data:[93,87,87,85,84], borderColor:'#C9A84C', tension:0.3 }] },
        options: opts
    });
    new Chart(document.getElementById('distChart'), {
        type: 'bar',
        data: { labels: ['>90%','80-89%','70-79%','60-69%','<60%'], datasets: [{ label:'%', data:[29,25,21,13,12], backgroundColor:'#2D7A4F' }] },
        options: opts
    });
}

function exportData(type) {
    let csv = "Rank,Store,Region,Score\n";
    const data = type==='board' ? filteredBoard : (type==='KM' ? filteredKM : filteredNPS);
    data.forEach((s,i) => { csv += `${i+1},"${s[2]}",${s[3]},${s[4]}\n`; });
    const blob = new Blob([csv], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `CCL_Jan_${type}.csv`;
    a.click();
}

function saveChart(id) {
    const a = document.createElement('a');
    a.href = document.getElementById(id).toDataURL('image/png');
    a.download = "CCL_Insight.png";
    a.click();
}

window.onload = () => { 
    renderMetric('KM', 8); 
    renderMetric('NPS', 5);
    initCharts(); 
};
</script>
</body>
</html>
