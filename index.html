<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCL Executive Hub — 2026 Performance</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root { --gold: #C9A84C; --gold-lt: #F0D080; --dark: #1A1208; --dark2: #2C1F0A; --green: #2D7A4F; --red: #C0392B; --shadow: 0 8px 30px rgba(26, 18, 8, 0.12); }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: #FDFAF4; color: var(--dark); min-height: 100vh; }

.header { background: linear-gradient(135deg, #1A1208, #2C1F0A); padding: 30px 20px; text-align: center; border-bottom: 2px solid var(--gold); color: var(--gold-lt); }
.logo { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 900; letter-spacing: 2px; }
.tata-tag { font-size: 10px; letter-spacing: 3px; opacity: 0.6; text-transform: uppercase; margin-top: 5px; }

.hub-body { max-width: 1300px; margin: 0 auto; padding: 40px 20px; }

/* ACTION ALERTS */
.alert-panel { background: var(--dark2); color: var(--gold-lt); padding: 25px; border-radius: 20px; margin-bottom: 40px; border-left: 6px solid var(--gold); }
.alert-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 15px; }
.alert-item { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; border: 1px solid rgba(240,208,128,0.2); font-size: 14px; }

/* MONTHLY ROADMAP */
.months-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-bottom: 50px; }
.month-card { background: white; border-radius: 20px; padding: 30px; cursor: pointer; transition: 0.4s; box-shadow: var(--shadow); border: 1px solid #E8DCC8; position: relative; overflow: hidden; }
.month-card.live:hover { transform: translateY(-5px); border-color: var(--gold); }
.month-card.live::after { content: 'LIVE'; position: absolute; top: 15px; right: -30px; background: var(--green); color: white; padding: 5px 40px; transform: rotate(45deg); font-size: 10px; font-weight: 800; }
.month-card.upcoming { opacity: 0.6; cursor: not-allowed; background: #F5F1EA; }
.month-card.upcoming::after { content: 'COMING SOON'; position: absolute; bottom: 0; left: 0; width: 100%; background: #DDD; color: #777; text-align: center; padding: 5px; font-size: 10px; font-weight: 700; }

/* HEATMAP */
.table-wrap { background: white; border-radius: 20px; overflow: hidden; box-shadow: var(--shadow); border: 1px solid #E8DCC8; }
table { width: 100%; border-collapse: collapse; }
th { background: var(--dark); color: var(--gold-lt); padding: 20px; text-align: left; font-size: 11px; text-transform: uppercase; }
td { padding: 18px 20px; border-bottom: 1px solid #F0F0F0; font-size: 14px; }

.viewer-section { display: none; position: fixed; inset: 0; z-index: 9999; background: white; flex-direction: column; }
.viewer-section.open { display: flex; }
.close-btn { background: var(--gold); color: var(--dark); border: none; padding: 12px 25px; border-radius: 8px; font-weight: 700; cursor: pointer; }
iframe { flex: 1; border: none; }
</style>
</head>
<body>

<div class="header">
    <div class="logo">CARATLANE</div>
    <div class="tata-tag">A TATA PRODUCT</div>
</div>

<div class="hub-body">
    <div class="alert-panel">
        <h2 style="font-size:18px; font-family:'Playfair Display';">📢 Executive Intelligence Priority</h2>
        <div class="alert-grid" id="alertGrid"></div>
    </div>

    <h2 style="margin-bottom:25px; font-family:'Playfair Display';">2026 Monthly Performance Roadmap</h2>
    <div class="months-grid" id="monthsGrid"></div>

    <h2 style="margin-bottom:25px; font-family:'Playfair Display';">National Regional Heatmap (Jan '26)</h2>
    <div class="table-wrap">
        <table>
            <thead><tr><th>Region Cluster</th><th>Nov '25</th><th>Dec '25</th><th>Jan '26</th><th>Variance</th><th>Status</th></tr></thead>
            <tbody id="heatBody"></tbody>
        </table>
    </div>
</div>

<div class="viewer-section" id="viewer">
    <div style="padding:15px; background:var(--dark2); display:flex; justify-content:space-between; align-items:center;">
        <span style="color:var(--gold-lt); font-weight:700;">CCL INTELLIGENCE VIEWER</span>
        <button class="close-btn" onclick="closeViewer()">✕ CLOSE REPORT</button>
    </div>
    <iframe id="reportFrame" src=""></iframe>
</div>

<script>
const REGIONS = [
  {r:"SAP", n:84, d:90, j:93}, {r:"EBJ", n:66, d:74, j:87}, {r:"EOC", n:76, d:79, j:87},
  {r:"NPJK", n:83, d:82, j:85}, {r:"NUP2", n:68, d:80, j:84}, {r:"ENE", n:75, d:66, j:77},
  {r:"STNK", n:72, d:81, j:83}, {r:"EWB", n:63, d:78, j:83}, {r:"STN", n:73, d:82, j:82},
  {r:"WMUM1", n:65, d:77, j:80}, {r:"NNCR2", n:70, d:76, j:81}, {r:"NRH", n:68, d:72, j:80},
  {r:"WMUM2", n:70, d:81, j:79}, {r:"NNCR3", n:70, d:79, j:78}, {r:"WMP", n:60, d:70, j:77},
  {r:"NNCR1", n:68, d:77, j:76}, {r:"NUP1", n:61, d:66, j:76}, {r:"WGJ", n:65, d:76, j:76},
  {r:"SKA2", n:60, d:67, j:75}, {r:"STG", n:51, d:71, j:72}, {r:"WROM2", n:55, d:62, j:72},
  {r:"WROM1", n:66, d:67, j:71}, {r:"SKA1", n:59, d:63, j:70}
];

const MONTHS = [
  {name:"January", score:79.2, status:"live", file:"jan-2026.html"},
  {name:"February", score:"--", status:"upcoming", file:""},
  {name:"March", score:"--", status:"upcoming", file:""}
];

function init() {
    document.getElementById('monthsGrid').innerHTML = MONTHS.map(m => `
        <div class="month-card ${m.status}" onclick="${m.status==='live'?`openViewer('${m.file}')`:''}">
            <div style="font-size:22px; font-weight:700; font-family:'Playfair Display';">${m.name}</div>
            <div style="margin-top:15px; font-weight:700; font-size:18px; color:var(--gold);">Avg: ${m.score}%</div>
            ${m.status==='live'?'<div style="color:var(--green); font-size:11px; margin-top:10px; font-weight:700;">OPEN INSIGHTS →</div>':''}
        </div>
    `).join('');

    document.getElementById('heatBody').innerHTML = REGIONS.map(rd => {
        const v = (rd.j - rd.d).toFixed(1);
        const color = v >= 0 ? 'var(--green)' : 'var(--red)';
        return `<tr><td><strong>${rd.r} Cluster</strong></td><td>${rd.n}</td><td>${rd.d}</td><td style="font-weight:700;">${rd.j}</td>
        <td style="color:${color}; font-weight:700;">${v >= 0 ? '▲' : '▼'} ${Math.abs(v)}</td>
        <td><span style="font-size:10px; font-weight:800; color:${color}">${v >= 0 ? 'MOMENTUM' : 'ACTION REQ'}</span></td></tr>`;
    }).join('');

    const alerts = REGIONS.filter(rd => (rd.j - rd.d) < 0);
    document.getElementById('alertGrid').innerHTML = alerts.map(rd => `
        <div class="alert-item"><strong>REGION ${rd.r}:</strong> Performance drop detected. Immediate review required.</div>
    `).join('') || '<div class="alert-item" style="border-color:var(--green)">All regions currently showing growth or stability.</div>';
}

function openViewer(file) {
    document.getElementById('reportFrame').src = file;
    document.getElementById('viewer').classList.add('open');
    document.body.style.overflow = 'hidden';
}

function closeViewer() {
    document.getElementById('viewer').classList.remove('open');
    document.getElementById('reportFrame').src = '';
    document.body.style.overflow = 'auto';
}

window.onload = init;
</script>
</body>
</html>
