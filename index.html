<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CaratLane Executive Hub — A TATA Product</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root { --gold: #C9A84C; --gold-lt: #F0D080; --dark: #1A1208; --dark2: #2C1F0A; --green: #2D7A4F; --red: #C0392B; --white: #FFFFFF; --shadow: 0 12px 40px rgba(26,18,8,0.18); }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: #FDFAF4; color: var(--dark); overflow-x: hidden; }

/* LUXURY HEADER - JEWELRY FEEL */
.header { background: linear-gradient(135deg, #1A1208 0%, #2C1F0A 100%); padding: 40px 20px; text-align: center; border-bottom: 3px solid var(--gold); position: relative; }
.header::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 100px; height: 3px; background: var(--gold-lt); box-shadow: 0 0 15px var(--gold-lt); }
.logo { font-family: 'Playfair Display', serif; font-size: 38px; font-weight: 900; color: var(--gold-lt); letter-spacing: 4px; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
.tata-tag { font-size: 11px; letter-spacing: 5px; opacity: 0.7; color: var(--gold-lt); text-transform: uppercase; margin-top: 8px; font-weight: 300; }

.container { max-width: 1300px; margin: 0 auto; padding: 50px 25px; }

/* DYNAMIC KPI CARDS */
.kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; margin-bottom: 50px; }
.kpi-card { background: var(--white); padding: 35px; border-radius: 15px; border: 1px solid #E8DCC8; box-shadow: var(--shadow); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; overflow: hidden; }
.kpi-card:hover { transform: translateY(-10px); border-color: var(--gold); }
.kpi-card::before { content: '✨'; position: absolute; top: 10px; right: 10px; opacity: 0.3; }
.kpi-label { font-size: 11px; font-weight: 700; color: #8A8A8A; text-transform: uppercase; letter-spacing: 2px; }
.kpi-val { font-family: 'Playfair Display', serif; font-size: 42px; font-weight: 900; margin: 10px 0; color: var(--dark); }

/* AUTOMATED HEATMAP */
.section-title { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; margin-bottom: 30px; border-left: 5px solid var(--gold); padding-left: 15px; }
.table-wrap { background: var(--white); border-radius: 15px; overflow: hidden; box-shadow: var(--shadow); border: 1px solid #E8DCC8; }
table { width: 100%; border-collapse: collapse; }
th { background: var(--dark); color: var(--gold-lt); padding: 22px; text-align: left; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
td { padding: 20px; border-bottom: 1px solid #F3EDE2; font-size: 15px; }
tr:hover { background: #FCF9F1; }

.viewer-overlay { display: none; position: fixed; inset: 0; z-index: 10000; background: rgba(26,18,8,0.95); flex-direction: column; backdrop-filter: blur(10px); }
.viewer-overlay.active { display: flex; }
.close-report { background: var(--gold); color: var(--dark); border: none; padding: 12px 30px; border-radius: 5px; font-weight: 700; cursor: pointer; }
iframe { flex: 1; border: none; background: var(--white); margin: 20px; border-radius: 10px; }
</style>
</head>
<script>
// FULL CLUSTER DATASET
const REGIONS = [
  {r:"SAP", n:84, d:90, j:93.0}, {r:"EBJ", n:66, d:74, j:87.0}, {r:"EOC", n:76, d:79, j:87.0},
  {r:"NPJK", n:83, d:82, j:85.0}, {r:"NUP2", n:68, d:80, j:84.0}, {r:"ENE", n:75, d:66, j:77.0},
  {r:"STNK", n:72, d:81, j:83.0}, {r:"EWB", n:63, d:78, j:83.0}, {r:"STN", n:73, d:82, j:82.0},
  {r:"WMUM1", n:65, d:77, j:80.0}, {r:"NRH", n:68, d:72, j:80.0}, {r:"WMUM2", n:70, d:81, j:79.0},
  {r:"NNCR2", n:70, d:76, j:81.0}, {r:"NNCR3", n:70, d:79, j:78.0}, {r:"WMP", n:60, d:70, j:77.0},
  {r:"NNCR1", n:68, d:77, j:76.0}, {r:"NUP1", n:61, d:66, j:76.0}, {r:"WGJ", n:65, d:76, j:76.0},
  {r:"SKA2", n:60, d:67, j:75.0}, {r:"STG", n:51, d:71, j:72.0}, {r:"WROM2", n:55, d:62, j:72.0},
  {r:"WROM1", n:66, d:67, j:71.0}, {r:"SKA1", n:59, d:63, j:70.0}
];

const MONTHS = [
  {name:"January", score:79.2, status:"live", file:"jan-2026.html"},
  {name:"February", score:"--", status:"upcoming"},
  {name:"March", score:"--", status:"upcoming"}
];

function init() {
    // AUTO-UPDATE BEST/WORST KPI CARDS
    const sorted = [...REGIONS].sort((a,b) => b.j - a.j);
    document.getElementById('top-name').innerText = sorted[0].r;
    document.getElementById('top-score').innerText = `Elite Average: ${sorted[0].j}%`;
    document.getElementById('worst-name').innerText = sorted[sorted.length-1].r;
    document.getElementById('worst-score').innerText = `Urgent Focus: ${sorted[sorted.length-1].j}%`;

    // RENDER ROADMAP CARDS
    document.getElementById('roadmapGrid').innerHTML = MONTHS.map(m => `
        <div class="kpi-card" style="cursor:${m.status==='live'?'pointer':'not-allowed'}; opacity:${m.status==='live'?'1':'0.6'}" 
             onclick="${m.status==='live'?`openViewer('${m.file}')`:''}">
            <div style="font-family:'Playfair Display'; font-size:22px; font-weight:700;">${m.name}</div>
            <div style="margin:15px 0; font-weight:700; color:var(--gold);">Avg Score: ${m.score}%</div>
            <div style="font-size:10px; font-weight:700; color:${m.status==='live'?'var(--green)':'#AAA'}">
                ${m.status==='live'?'REPORT FINALIZED':'PROCESSING DATA...'}
            </div>
        </div>
    `).join('');

    // RENDER HEATMAP TABLE
    document.getElementById('heatBody').innerHTML = REGIONS.map(rd => {
        const v = (rd.j - rd.d).toFixed(1);
        const color = v >= 0 ? 'var(--green)' : 'var(--red)';
        return `<tr>
            <td><strong>${rd.r} Cluster</strong></td>
            <td>${rd.n}</td><td>${rd.d}</td><td style="font-weight:700">${rd.j}</td>
            <td style="color:${color}; font-weight:700;">${v>=0?'▲':'▼'} ${Math.abs(v)}</td>
            <td><span style="font-size:10px; font-weight:800; color:${color}">${v>=0?'MOMENTUM':'ACTION REQUIRED'}</span></td>
        </tr>`;
    }).join('');
}

function openViewer(f) { document.getElementById('reportFrame').src = f; document.getElementById('viewer').classList.add('active'); document.body.style.overflow = 'hidden'; }
function closeViewer() { document.getElementById('viewer').classList.remove('active'); document.getElementById('reportFrame').src = ''; document.body.style.overflow = 'auto'; }
window.onload = init;
</script>
</body>
</html>
<body>

<div class="header">
    <div class="logo">CARATLANE</div>
    <div class="tata-tag">A TATA PRODUCT</div>
</div>

<div class="container">
    <div class="kpi-row">
        <div class="kpi-card" style="border-top: 5px solid var(--green)">
            <div class="kpi-label">🏆 Top Performing Region</div>
            <div class="kpi-val" id="top-name">--</div>
            <div id="top-score" style="color:var(--green); font-weight:700;">--</div>
        </div>
        <div class="kpi-card" style="border-top: 5px solid var(--red)">
            <div class="kpi-label">⚠️ Priority Action Region</div>
            <div class="kpi-val" id="worst-name">--</div>
            <div id="worst-score" style="color:var(--red); font-weight:700;">--</div>
        </div>
        <div class="kpi-card" style="border-top: 5px solid var(--gold)">
            <div class="kpi-label">📈 National Average</div>
            <div class="kpi-val">79.2%</div>
            <div style="color:var(--gold); font-weight:700;">January 2026 Snapshot</div>
        </div>
    </div>

    <div class="section-title">2026 Intelligence Roadmap</div>
    <div id="roadmapGrid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:25px; margin-bottom:60px;"></div>

    <div class="section-title">Regional Performance Variance (3-Month Trend)</div>
    <div class="table-wrap">
        <table>
            <thead><tr><th>Region Cluster</th><th>Nov '25</th><th>Dec '25</th><th>Jan '26</th><th>Variance</th><th>Management Status</th></tr></thead>
            <tbody id="heatBody"></tbody>
        </table>
    </div>
</div>

<div class="viewer-overlay" id="viewer">
    <div style="padding:20px 40px; display:flex; justify-content:space-between; align-items:center; color:var(--gold-lt);">
        <span style="font-family:'Playfair Display'; font-size:20px; font-weight:700;">PERFORMANCE INTELLIGENCE REPORT</span>
        <button class="close-report" onclick="closeViewer()">✕ CLOSE REPORT</button>
    </div>
    <iframe id="reportFrame" src=""></iframe>
</div>
