<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCL — Executive Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root { --cl-purple: #4F3267; --cl-bg: #F9F7FA; --white: #FFFFFF; --green: #2D7A4F; --red: #C0392B; --gold: #C9A84C; --shadow: 0 8px 30px rgba(79, 50, 103, 0.12); }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--cl-bg); color: var(--cl-purple); }

.header { background: var(--white); padding: 30px; text-align: center; border-bottom: 1px solid #EEE; box-shadow: var(--shadow); }
.logo-text { font-size: 28px; font-weight: 700; letter-spacing: 2px; }
.tata-tag { font-size: 10px; letter-spacing: 3px; color: var(--gray); opacity: 0.7; }

.hub-body { max-width: 1300px; margin: 0 auto; padding: 40px 20px; }

/* 10/10 ACTION ALERTS */
.action-panel { background: linear-gradient(135deg, #4F3267, #6B498C); color: white; padding: 25px; border-radius: 16px; margin-bottom: 40px; box-shadow: var(--shadow); }
.action-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 15px; }
.alert-item { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; border-left: 4px solid #FFD700; }

.kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 40px; }
.kpi-card { background: white; padding: 25px; border-radius: 16px; border-top: 6px solid var(--cl-purple); box-shadow: var(--shadow); transition: 0.3s; }
.kpi-card:hover { transform: translateY(-5px); }
.kpi-val { font-size: 36px; font-weight: 700; margin: 5px 0; }

.table-wrap { background: white; border-radius: 16px; overflow: hidden; box-shadow: var(--shadow); border: 1px solid #EEE; }
table { width: 100%; border-collapse: collapse; }
th { background: #F4F0F7; padding: 18px; font-size: 11px; text-transform: uppercase; text-align: left; }
td { padding: 18px; border-bottom: 1px solid #F4F0F7; }

.viewer-section { display: none; position: fixed; inset: 0; z-index: 9999; background: white; flex-direction: column; }
.viewer-section.open { display: flex; }
.close-btn { background: var(--cl-purple); color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: 700; cursor: pointer; }
iframe { flex: 1; border: none; }
</style>
</head>
<body>

<div class="header">
    <div class="logo-text">CARATLANE</div>
    <div class="tata-tag">A TATA PRODUCT</div>
</div>

<div class="hub-body">
    <div class="action-panel">
        <h2 style="font-size:18px;">🚀 Executive Priority Actions (March 2026)</h2>
        <div class="action-grid" id="actionGrid">
            </div>
    </div>

    <div class="kpi-row">
        <div class="kpi-card" style="border-top-color:var(--green)"><div class="kpi-label">🏆 TOP REGION</div><div class="kpi-val">SAP</div><div style="color:var(--green); font-weight:700;">Score: 93.0</div></div>
        <div class="kpi-card" style="border-top-color:var(--red)"><div class="kpi-label">⚠️ PRIORITY FIX</div><div class="kpi-val">ENE</div><div style="color:var(--red); font-weight:700;">Score: 77.0</div></div>
        <div class="kpi-card"><div class="kpi-label">💎 QUALITY WINNERS</div><div class="kpi-val">38</div><div style="color:var(--gold); font-weight:700;">Stores > 95%</div></div>
    </div>

    <div class="table-wrap">
        <table>
            <thead><tr><th>Region</th><th>Nov '25</th><th>Dec '25</th><th>Jan '26</th><th>Growth</th></tr></thead>
            <tbody id="heatBody"></tbody>
        </table>
    </div>

    <button class="btn-dl" style="margin-top:40px; padding:20px; width:100%; background:var(--cl-purple); color:white; border:none; border-radius:12px; font-size:18px; font-weight:700; cursor:pointer;" onclick="openJan()">
        OPEN JANUARY 2026 FULL INTELLIGENCE REPORT →
    </button>
</div>

<div class="viewer-section" id="viewer">
    <div style="padding:15px; background:#EEE; display:flex; justify-content:space-between; align-items:center;">
        <span style="font-weight:700;">CCL Dashboard Viewer</span>
        <button class="close-btn" onclick="document.getElementById('viewer').classList.remove('open')">✕ CLOSE</button>
    </div>
    <iframe id="ifr" src=""></iframe>
</div>

<script>
const DATA = [
    {r:"SAP", n:84, d:90, j:93}, {r:"EBJ", n:66, d:74, j:87},
    {r:"EOC", n:76, d:79, j:87}, {r:"ENE", n:75, d:66, j:77}
];

function init() {
    document.getElementById('heatBody').innerHTML = DATA.map(rd => {
        const v = (rd.j - rd.d).toFixed(1);
        return `<tr><td><strong>${rd.r}</strong></td><td>${rd.n}</td><td>${rd.d}</td><td style="font-weight:700">${rd.j}</td>
        <td style="color:${v>=0?'var(--green)':'var(--red)'}">${v>=0?'▲':'▼'} ${Math.abs(v)}</td></tr>`;
    }).join('');

    const low = DATA.filter(rd => (rd.j - rd.d) < 0);
    document.getElementById('actionGrid').innerHTML = low.map(rd => `
        <div class="alert-item"><strong>Region ${rd.r}:</strong> Performance drop detected. Schedule NPS audit immediately.</div>
    `).join('') || '<div class="alert-item" style="border-color:var(--green)">All regions showing positive momentum.</div>';
}
function openJan() { document.getElementById('ifr').src='jan-2026.html'; document.getElementById('viewer').classList.add('open'); }
window.onload = init;
</script>
</body>
</html>
