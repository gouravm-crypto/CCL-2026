<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CaratLane CCL 2026 — Executive Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C9A84C;
  --gold-lt: #E8C96A;
  --ink: #0F0A04;
  --ink2: #1A1005;
  --surface: #F8F5EE;
  --surface2: #EEE8D8;
  --green: #1A5C35;
  --green-lt: #C8E6D4;
  --red: #9B2111;
  --border: #E2D8C4;
  --text-muted: #8A7A62;
  --shadow-sm: 0 1px 3px rgba(15,10,4,0.07), 0 4px 16px rgba(15,10,4,0.07);
  --shadow: 0 2px 8px rgba(15,10,4,0.08), 0 12px 40px rgba(15,10,4,0.10);
  --shadow-lg: 0 4px 16px rgba(15,10,4,0.12), 0 24px 64px rgba(15,10,4,0.18);
}
* { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; }
body { font-family:'Outfit',sans-serif; background:var(--surface); color:var(--ink); -webkit-font-smoothing:antialiased; }

/* HEADER */
.header {
  background:var(--ink2);
  padding:52px 48px 44px;
  text-align:center;
  position:relative; overflow:hidden;
}
.header::before {
  content:''; position:absolute; inset:0;
  background:radial-gradient(ellipse 80% 55% at 50% -5%, rgba(201,168,76,0.20) 0%, transparent 65%);
  pointer-events:none;
}
.header::after {
  content:''; position:absolute; bottom:0; left:50%; transform:translateX(-50%);
  width:180px; height:1px;
  background:linear-gradient(90deg, transparent, var(--gold), transparent);
}
.brand-name {
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(40px,6vw,72px); font-weight:700;
  letter-spacing:8px; color:var(--gold-lt);
  line-height:1; text-transform:uppercase;
}
.brand-tata {
  font-size:10px; letter-spacing:5px; text-transform:uppercase;
  color:rgba(232,201,106,0.38); margin-top:8px; font-weight:400;
}
.brand-rule { width:40px; height:1px; margin:22px auto; background:linear-gradient(90deg, transparent, rgba(201,168,76,0.6), transparent); }
.brand-sub {
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(14px,2vw,18px); font-style:italic; font-weight:400;
  color:rgba(232,201,106,0.55); letter-spacing:1px;
}

/* KPI STRIP */
.kpi-strip { display:grid; grid-template-columns:repeat(3,1fr); border-bottom:1px solid var(--border); }
@media(max-width:640px){ .kpi-strip{grid-template-columns:1fr;} }
.kpi-cell { padding:30px 36px; border-right:1px solid var(--border); }
.kpi-cell:last-child { border-right:none; }
.kpi-indicator { display:flex; align-items:center; gap:7px; font-size:10px; font-weight:700; letter-spacing:2.5px; text-transform:uppercase; color:var(--text-muted); margin-bottom:10px; }
.dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.dot-green { background:var(--green); }
.dot-gold  { background:var(--gold); }
.dot-red   { background:var(--red); }
.kpi-val { font-family:'Cormorant Garamond',serif; font-size:clamp(26px,3.5vw,44px); font-weight:600; color:var(--ink); line-height:1; margin-bottom:5px; }
.kpi-sub { font-size:12.5px; font-weight:600; }
.kpi-sub.green { color:var(--green); }
.kpi-sub.red   { color:var(--red); }
.kpi-sub.gold  { color:var(--gold); }

/* MAIN */
.main { max-width:1380px; margin:0 auto; padding:52px 40px 72px; }
@media(max-width:700px){ .main{padding:32px 20px 60px;} }
.section-eyebrow { font-size:10px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--text-muted); margin-bottom:10px; }
.section-title { font-family:'Cormorant Garamond',serif; font-size:clamp(24px,3vw,34px); font-weight:600; color:var(--ink); margin-bottom:32px; }

/* MONTHS GRID */
.months-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:14px; margin-bottom:64px; }

.month-card {
  background:#fff; border:1px solid var(--border);
  border-radius:16px; padding:26px 22px 22px;
  position:relative; overflow:hidden;
  transition:transform 0.22s, box-shadow 0.22s, border-color 0.22s;
}
.month-card.locked { opacity:0.42; cursor:default; }
.month-card.live {
  cursor:pointer;
  border-color:rgba(201,168,76,0.45);
  background:linear-gradient(145deg, #fff 0%, #fffdf6 100%);
}
.month-card.live::before {
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
  background:linear-gradient(90deg, var(--gold), var(--gold-lt), var(--gold));
}
.month-card.live:hover { transform:translateY(-5px); box-shadow:var(--shadow-lg); border-color:var(--gold); }
.month-live-badge {
  position:absolute; top:14px; right:14px;
  background:var(--gold); color:var(--ink);
  font-size:8px; font-weight:800; letter-spacing:1px; text-transform:uppercase;
  padding:3px 8px; border-radius:4px;
}
.month-number { font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--text-muted); margin-bottom:8px; }
.month-name { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:600; color:var(--ink); margin-bottom:16px; line-height:1; }
.month-score-val { font-family:'Cormorant Garamond',serif; font-size:38px; font-weight:700; color:var(--gold); line-height:1; }
.month-score-label { font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); margin-top:3px; font-weight:500; }
.month-pending { font-size:13px; color:#C4BAA8; margin-top:8px; }
.month-cta { margin-top:18px; display:flex; align-items:center; gap:6px; font-size:10.5px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--gold); }
.month-cta svg { width:12px; height:12px; stroke:var(--gold); stroke-width:2.5; fill:none; }

/* REGION TABLE */
.table-wrap { background:#fff; border:1px solid var(--border); border-radius:18px; overflow:hidden; box-shadow:var(--shadow-sm); }
.table-scroll { overflow-x:auto; }
table { width:100%; border-collapse:collapse; min-width:640px; }
thead tr { background:var(--ink2); }
th { padding:14px 20px; font-size:9.5px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:rgba(232,201,106,0.60); text-align:left; white-space:nowrap; }
td { padding:15px 20px; border-bottom:1px solid #F0EAD8; font-size:14px; }
tbody tr:last-child td { border-bottom:none; }
tbody tr:hover td { background:#FDFAF4; }
.cluster-label { font-weight:700; color:var(--ink); }
.score-fig { font-family:'Cormorant Garamond',serif; font-size:20px; font-weight:600; color:var(--ink); }
.var-up { color:var(--green); font-weight:700; font-size:13px; }
.var-dn { color:var(--red); font-weight:700; font-size:13px; }
.pct-pill { display:inline-block; padding:3px 11px; border-radius:20px; font-size:11.5px; font-weight:700; background:var(--surface2); color:var(--text-muted); }
.pct-pill.hi { background:var(--green-lt); color:var(--green); }
.pct-pill.lo { background:#F5DADA; color:var(--red); }

/* VIEWER */
.viewer { display:none; position:fixed; inset:0; z-index:9999; background:rgba(10,6,1,0.96); flex-direction:column; }
.viewer.open { display:flex; animation:vfade 0.2s ease; }
@keyframes vfade { from{opacity:0} to{opacity:1} }
.viewer-bar { flex-shrink:0; padding:18px 28px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid rgba(201,168,76,0.12); }
.viewer-title { font-family:'Cormorant Garamond',serif; font-size:18px; font-weight:600; color:var(--gold-lt); }
.viewer-close { background:rgba(201,168,76,0.10); color:var(--gold-lt); border:1px solid rgba(201,168,76,0.22); padding:9px 20px; border-radius:8px; font-size:11px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; cursor:pointer; font-family:'Outfit',sans-serif; transition:all 0.18s; }
.viewer-close:hover { background:var(--gold); color:var(--ink); }
iframe { flex:1; border:none; background:#fff; margin:18px 22px 22px; border-radius:12px; }
</style>
</head>
<body>

<header class="header">
  <div class="brand-name">CaratLane</div>
  <div class="brand-tata">A Tata Product</div>
  <div class="brand-rule"></div>
  <div class="brand-sub">Champions Compliance League — 2026</div>
</header>

<div class="kpi-strip">
  <div class="kpi-cell">
    <div class="kpi-indicator"><span class="dot dot-green"></span>Best Cluster</div>
    <div class="kpi-val" id="kpi-top-name">—</div>
    <div class="kpi-sub green" id="kpi-top-score">—</div>
  </div>
  <div class="kpi-cell">
    <div class="kpi-indicator"><span class="dot dot-gold"></span>National Average</div>
    <div class="kpi-val">79.2%</div>
    <div class="kpi-sub gold">January 2026</div>
  </div>
  <div class="kpi-cell">
    <div class="kpi-indicator"><span class="dot dot-red"></span>Needs Attention</div>
    <div class="kpi-val" id="kpi-worst-name">—</div>
    <div class="kpi-sub red" id="kpi-worst-score">—</div>
  </div>
</div>

<main class="main">
  <div class="section-eyebrow">2026 Performance Calendar</div>
  <div class="section-title">Monthly Reports</div>
  <div class="months-grid" id="monthsGrid"></div>

  <div class="section-eyebrow">Regional Intelligence</div>
  <div class="section-title">Cluster Performance Trends</div>
  <div class="table-wrap">
    <div class="table-scroll">
      <table>
        <thead><tr>
          <th>Cluster</th><th>Nov '25</th><th>Dec '25</th><th>Jan '26</th><th>Variance</th><th>Stores ≥90%</th>
        </tr></thead>
        <tbody id="regionBody"></tbody>
      </table>
    </div>
  </div>
</main>

<div class="viewer" id="viewer">
  <div class="viewer-bar">
    <div class="viewer-title" id="viewerTitle">Performance Report</div>
    <button class="viewer-close" onclick="closeViewer()">Close ✕</button>
  </div>
  <iframe id="reportFrame" src=""></iframe>
</div>

<script>
const REGIONS = [
  {r:"SAP",n:84.2,d:90.1,j:93.0,p:95},
  {r:"EBJ",n:66.5,d:74.3,j:87.2,p:94},
  {r:"EOC",n:76.1,d:79.4,j:87.1,p:93},
  {r:"NPJK",n:83.4,d:82.1,j:85.3,p:95},
  {r:"NUP2",n:68.7,d:80.2,j:84.1,p:92},
  {r:"STNK",n:72.3,d:81.5,j:83.4,p:94},
  {r:"EWB",n:63.0,d:78.0,j:83.0,p:90},
  {r:"SKA1",n:59.0,d:63.0,j:70.0,p:48}
];

const MONTHS = [
  {n:1,name:"January",score:79.2,live:true,file:"jan-2026.html"},
  {n:2,name:"February",live:false},{n:3,name:"March",live:false},
  {n:4,name:"April",live:false},{n:5,name:"May",live:false},
  {n:6,name:"June",live:false},{n:7,name:"July",live:false},
  {n:8,name:"August",live:false},{n:9,name:"September",live:false},
  {n:10,name:"October",live:false},{n:11,name:"November",live:false},
  {n:12,name:"December",live:false}
];

function init() {
  const sorted = [...REGIONS].sort((a,b)=>b.j-a.j);
  const best = sorted[0], worst = sorted[sorted.length-1];
  document.getElementById('kpi-top-name').textContent = best.r + ' Cluster';
  document.getElementById('kpi-top-score').textContent = best.j.toFixed(1) + '% — Elite Performance';
  document.getElementById('kpi-worst-name').textContent = worst.r + ' Cluster';
  document.getElementById('kpi-worst-score').textContent = worst.j.toFixed(1) + '% — Action Required';

  document.getElementById('monthsGrid').innerHTML = MONTHS.map(m => {
    const num = String(m.n).padStart(2,'0');
    if (m.live) return `
      <div class="month-card live" onclick="openViewer('${m.file}','${m.name} 2026')">
        <div class="month-live-badge">Live</div>
        <div class="month-number">Month ${num}</div>
        <div class="month-name">${m.name}</div>
        <div class="month-score-val">${m.score}%</div>
        <div class="month-score-label">National Average</div>
        <div class="month-cta">View Report
          <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </div>
      </div>`;
    return `
      <div class="month-card locked">
        <div class="month-number">Month ${num}</div>
        <div class="month-name">${m.name}</div>
        <div class="month-pending">Data pending</div>
      </div>`;
  }).join('');

  document.getElementById('regionBody').innerHTML = REGIONS.map(r => {
    const v = (r.j - r.d).toFixed(1);
    const isUp = parseFloat(v) >= 0;
    const pClass = r.p >= 90 ? 'hi' : r.p < 70 ? 'lo' : '';
    return `<tr>
      <td><span class="cluster-label">${r.r}</span></td>
      <td><span class="score-fig">${r.n}%</span></td>
      <td><span class="score-fig">${r.d}%</span></td>
      <td><span class="score-fig">${r.j}%</span></td>
      <td><span class="${isUp?'var-up':'var-dn'}">${isUp?'▲':'▼'} ${Math.abs(v)}%</span></td>
      <td><span class="pct-pill ${pClass}">${r.p}%</span></td>
    </tr>`;
  }).join('');
}

function openViewer(file, title) {
  document.getElementById('viewerTitle').textContent = title + ' — Intelligence Report';
  document.getElementById('reportFrame').src = file;
  document.getElementById('viewer').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeViewer() {
  document.getElementById('viewer').classList.remove('open');
  document.getElementById('reportFrame').src = '';
  document.body.style.overflow = '';
}
window.onload = init;
</script>
</body>
</html>
