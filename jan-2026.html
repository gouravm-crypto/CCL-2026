<style>
:root {
  --cl-purple: #4F3267; --cl-bg: #F9F7FA; --white: #FFFFFF; --gray: #6B6B6B;
  --green: #2D7A4F; --gold: #C9A84C; --red: #C0392B; --shadow: 0 4px 24px rgba(79, 50, 103, 0.1);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--cl-bg); color: var(--cl-purple); }

.nav-tabs { display: flex; background: var(--cl-purple); justify-content: center; position: sticky; top: 0; z-index: 1000; overflow-x: auto; }
.nav-tab { padding: 18px 25px; color: rgba(255,255,255,0.6); cursor: pointer; font-weight: 700; text-transform: uppercase; font-size: 11px; white-space: nowrap; }
.nav-tab.active { color: var(--white); background: rgba(255,255,255,0.1); border-bottom: 3px solid var(--white); }

.main { padding: 30px; max-width: 1400px; margin: 0 auto; }
.section { display: none; }
.section.active { display: block; animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.winners-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; margin-bottom: 40px; }
.winner-card { background: white; padding: 20px; border-radius: 12px; border: 2.2px solid #EEE; text-align: center; box-shadow: var(--shadow); position: relative; }
.winner-card.gold { border-color: var(--gold); background: #FFFDF5; }
.winner-card.green { border-color: var(--green); background: #F5FAF6; }
.winner-card .score { font-size: 26px; font-weight: 900; color: var(--cl-purple); margin: 10px 0; }

.chart-card { background: white; padding: 40px; border-radius: 15px; height: 500px; display: flex; flex-direction: column; margin-bottom: 25px; box-shadow: var(--shadow); }
.table-wrap { background: white; border-radius: 15px; border: 1px solid #E6DDEB; overflow-x: auto; box-shadow: var(--shadow); margin-bottom: 30px; }
table { width: 100%; border-collapse: collapse; min-width: 1100px; }
th { background: #F4F0F7; color: var(--cl-purple); padding: 18px; text-align: left; font-size: 11px; text-transform: uppercase; cursor: pointer; }
td { padding: 16px 18px; border-bottom: 1px solid #F4F0F7; font-size: 14px; }
.badge { padding: 6px 12px; border-radius: 20px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
.badge-gold { background: #FFF9E6; color: #8A6200; }
.badge-green { background: #E8F5EE; color: var(--green); }
</style>
</head>

function switchTab(e, id) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-'+id).classList.add('active');
    e.target.classList.add('active');
    if(id === 'summary') initCharts();
}

function rb() {
    const gold = MASTER_DATA.filter(s => s[4] >= 100);
    const green = MASTER_DATA.filter(s => s[4] >= 95 && s[4] < 100);
    document.getElementById('gold-winners').innerHTML = gold.map(s => `<div class="winner-card gold"><strong>${s[2]}</strong><br><small>${s[3]}</small><div class="score">${s[4]}%</div></div>`).join('');
    document.getElementById('green-winners').innerHTML = green.map(s => `<div class="winner-card green"><strong>${s[2]}</strong><br><small>${s[3]}</small><div class="score">${s[4]}%</div></div>`).join('');
    
    document.getElementById('bb').innerHTML = MASTER_DATA.map((s,i) => `<tr><td>${i+1}</td><td><strong>${s[2]}</strong></td><td>${s[3]}</td><td>${s[0]}</td><td>${s[4]}</td><td>${s[5]||0}</td><td>${s[6]||0}</td><td><span class="badge ${s[4]>=100?'badge-gold':(s[4]>=95?'badge-green':'')}">${s[4]>=95?'WINNER':'ELIGIBLE'}</span></td></tr>`).join('');
}

function fb() {
    const q = document.getElementById('sb').value.toLowerCase();
    const fd = MASTER_DATA.filter(s => s[2].toLowerCase().includes(q) || s[3].toLowerCase().includes(q));
    document.getElementById('bb').innerHTML = fd.map((s,i) => `<tr><td>${i+1}</td><td><strong>${s[2]}</strong></td><td>${s[3]}</td><td>${s[0]}</td><td>${s[4]}</td><td>${s[5]||0}</td><td>${s[6]||0}</td><td><span class="badge ${s[4]>=100?'badge-gold':(s[4]>=95?'badge-green':'')}">${s[4]>=95?'WINNER':'ELIGIBLE'}</span></td></tr>`).join('');
}

function initCharts() {
    const o = { responsive:true, maintainAspectRatio:false, layout:{padding:{top:40}}, plugins:{datalabels:{display:true, color:'#4F3267', font:{weight:'bold'}, align:'top', anchor:'end'}} };
    new Chart(document.getElementById('trendChart'), { type:'line', data:{ labels:REGIONS.map(r=>r.r), datasets:[{label:'Jan Score', data:REGIONS.map(r=>r.j), borderColor:'#4F3267'}] }, options:o });
    new Chart(document.getElementById('distChart'), { type:'bar', data:{ labels:['>90%','80-89%','70-79%','<60%'], datasets:[{label:'% of Stores', data:[29,25,21,12], backgroundColor:'#4F3267'}] }, options:o });
}

window.onload = () => { rb(); initCharts(); };
