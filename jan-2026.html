<style>
:root { --gold: #C9A84C; --gold-lt: #F0D080; --dark: #1A1208; --dark2: #2C1F0A; --green: #2D7A4F; --green-lt: #E8F5EE; --white: #FFFFFF; --shadow: 0 12px 40px rgba(26,18,8,0.18); }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: #FDFAF4; color: var(--dark); -webkit-font-smoothing: antialiased; }

/* NAVIGATION */
.nav-tabs { display: flex; background: var(--dark2); overflow-x: auto; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
.nav-tab { padding: 15px 25px; color: rgba(240,208,128,0.6); cursor: pointer; font-weight: 700; text-transform: uppercase; font-size: 11px; white-space: nowrap; }
.nav-tab.active { color: var(--gold-lt); border-bottom: 3px solid var(--gold); background: rgba(255,255,255,0.05); }

.main { padding: 25px; max-width: 1400px; margin: 0 auto; }
.section { display: none; } .section.active { display: block; animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

/* ANALYTICS CARDS */
.insight-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; margin-bottom: 30px; }
.chart-card { background: var(--white); padding: 25px; border-radius: 15px; border: 1px solid #E8DCC8; box-shadow: var(--shadow); cursor: pointer; transition: 0.3s; }
.chart-card:hover { transform: scale(1.01); border-color: var(--gold); }
.chart-header { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; margin-bottom: 20px; border-bottom: 1px solid #F0F0F0; padding-bottom: 10px; display: flex; justify-content: space-between; }

/* TABLE & PAGINATION */
.table-wrap { background: white; border-radius: 12px; border: 1px solid #E8DCC8; overflow-x: auto; box-shadow: var(--shadow); }
table { width: 100%; border-collapse: collapse; min-width: 1000px; }
thead { background: var(--dark); color: var(--gold-lt); }
th { padding: 15px; text-align: left; font-size: 10px; text-transform: uppercase; }
td { padding: 12px 15px; border-bottom: 1px solid #F0F0F0; font-size: 13px; }
.row-gold { background: #FFFDF0 !important; } .row-green { background: #F5FAF6 !important; }

.btn-export { background: var(--green); color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.3s; }
.pagination { display: flex; justify-content: center; align-items: center; gap: 8px; padding: 25px 0; }
.page-btn { padding: 8px 16px; background: white; border: 1px solid #DDD; border-radius: 6px; cursor: pointer; font-weight: 700; }
.page-btn.active { background: var(--dark); color: var(--gold-lt); }
</style>
</head>

let page = 1; const perPage = 15; let view = [...MASTER_DATA];

function exportCSV() {
    let csv = "Rank,Store,Region,Score,NPS,Reviews,Ops,KM,ELearn\n";
    view.forEach(s => { csv += `${s[0]},"${s[1]}",${s[2]},${s[4]},${s[5]},${s[6]},${s[7]},${s[8]},${s[9]}\n`; });
    const b = new Blob([csv], { type: 'text/csv' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(b); 
    a.download = `CCL_Jan26_Regional_Report.csv`; a.click();
}

function showTab(id) {
    document.querySelectorAll('.section, .nav-tab').forEach(el => el.classList.remove('active'));
    document.getElementById('tab-'+id).classList.add('active');
    if(event) event.target.classList.add('active');
    if(id === 'analytics') setTimeout(initCharts, 100);
}

function initCharts() {
    new Chart(document.getElementById('metricChart'), { 
        type:'radar', 
        data:{ labels:['NPS','Reviews','Ops','KM','E-Learn'], 
        datasets:[{label:'National Avg', data:[22,23,18,14,14], borderColor:'#C9A84C', backgroundColor:'rgba(201,168,76,0.2)'}] },
        options:{ responsive:true, maintainAspectRatio:false }
    });
    new Chart(document.getElementById('kmChart'), { 
        type:'doughnut', 
        data:{ labels:['KM Excellence','KM Maintenance','KM Urgent'], datasets:[{data:[140,140,66], backgroundColor:['#2D7A4F','#F0D080','#C0392B']}] },
        options:{ responsive:true, maintainAspectRatio:false }
    });
}

function filter() {
    const q = document.getElementById('sb').value.toUpperCase();
    view = MASTER_DATA.filter(s => s[1].toUpperCase().includes(q) || s[2].toUpperCase().includes(q));
    page = 1; renderTable();
}

function renderTable() {
    const start = (page-1)*perPage; const paged = view.slice(start, start+perPage);
    document.getElementById('scoreBody').innerHTML = paged.map(s => `
        <tr class="${s[4]>=100?'row-gold':(s[4]>=95?'row-green':'')}">
            <td>${s[0]}</td><td><strong>${s[1]}</strong></td><td>${s[2]}</td><td>${s[4]}</td><td>${s[5]}</td><td>${s[6]}</td><td>${s[7]}</td><td>${s[8]}</td><td>${s[9]}</td>
        </tr>`).join('');
    renderPagination();
}

function renderPagination() {
    const total = Math.ceil(view.length/perPage);
    let h = `<button class="page-btn" ${page==1?'disabled':''} onclick="goP(${page-1})">Prev</button>`;
    for(let i=1; i<=total; i++) if(i==1 || i==total || (i>=page-1 && i<=page+1)) h += `<button class="page-btn ${page==i?'active':''}" onclick="goP(${i})">${i}</button>`;
    document.getElementById('pagCont').innerHTML = h + `<button class="page-btn" ${page==total?'disabled':''} onclick="goP(${page+1})">Next</button>`;
}

function goP(p) { page = p; renderTable(); window.scrollTo(0,0); }

window.onload = () => { 
    renderTable(); 
    initCharts(); 
    const gold = MASTER_DATA.filter(s => s[4] >= 100);
    document.getElementById('gold-grid').innerHTML = gold.map(s => `
        <div class="winner-card gold-style"><strong>${s[1]}</strong><br><small>${s[2]}</small><div style="font-size:20px; font-weight:900; color:#8A6200;">${s[4]}%</div></div>
    `).join('');
};


let page = 1; const perPage = 15; let view = [];

function showTab(id) {
    document.querySelectorAll('.section, .nav-tab').forEach(el => el.classList.remove('active'));
    document.getElementById('tab-'+id).classList.add('active');
    event.target.classList.add('active');
    if(id === 'analytics') setTimeout(initCharts, 100);
}

function initCharts() {
    // ANALYTICS UPGRADE: Reflecting the 6 metrics from the email
    new Chart(document.getElementById('metricChart'), { type:'radar', data:{ labels:['NPS','Reviews','Ops','KM','E-Learn'], datasets:[{label:'National Avg', data:[22,23,18,14,14], borderColor:'#C9A84C', backgroundColor:'rgba(201,168,76,0.2)'}] }, options:{responsive:true, maintainAspectRatio:false} });
    
    new Chart(document.getElementById('regBarChart'), { type:'bar', data:{ labels:['SAP','EBJ','EOC','NPJK','NUP2','STNK'], datasets:[{label:'Jan Avg', data:[93,87,87,85,84,83], backgroundColor:'#1A1208'}] }, options:{indexAxis:'y', responsive:true, maintainAspectRatio:false} });
    
    new Chart(document.getElementById('progChart'), { type:'line', data:{ labels:['Nov','Dec','Jan'], datasets:[{label:'National Score', data:[67,75,79.2], borderColor:'#C9A84C', tension:0.4, fill:true, backgroundColor:'rgba(201,168,76,0.1)'}] }, options:{responsive:true, maintainAspectRatio:false} });

    new Chart(document.getElementById('scatterChart'), { type:'scatter', data:{ datasets:[{label:'Stores', data:[{x:15,y:25},{x:12,y:20},{x:15,y:25},{x:10,y:15}], backgroundColor:'#2D7A4F'}] }, options:{ scales:{x:{title:{display:true,text:'E-Learning'}},y:{title:{display:true,text:'NPS'}}}, responsive:true, maintainAspectRatio:false} });
}

function exportCSV() {
    let csv = "Rank,Store,Region,Score,NPS,Reviews,Ops,KM,ELearn\n";
    view.forEach((s, i) => { csv += `${s[0]},"${s[1]}",${s[2]},${s[4]},${s[5]},${s[6]},${s[7]},${s[8]},${s[9]}\n`; });
    const b = new Blob([csv], { type: 'text/csv' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `CCL_Regional_Export.csv`; a.click();
}

function filter() {
    const q = document.getElementById('sb').value.toUpperCase();
    view = MASTER_DATA.filter(s => s[1].toUpperCase().includes(q) || s[2].toUpperCase().includes(q));
    page = 1; renderTable();
}

function renderTable() {
    const start = (page-1)*perPage; const paged = view.slice(start, start+perPage);
    document.getElementById('scoreBody').innerHTML = paged.map(s => `
        <tr class="${s[4]>=100?'row-gold':(s[4]>=95?'row-green':'')}">
            <td>${s[0]}</td><td><strong>${s[1]}</strong></td><td>${s[2]}</td><td>${s[4]}</td><td>${s[5]}</td><td>${s[6]}</td><td>${s[7]}</td><td>${s[8]}</td><td>${s[9]}</td>
        </tr>`).join('');
    renderPagination();
}

function renderPagination() {
    const total = Math.ceil(view.length/perPage);
    let h = `<button class="page-btn" ${page==1?'disabled':''} onclick="goP(${page-1})">Prev</button>`;
    for(let i=1; i<=total; i++) if(i==1 || i==total || (i>=page-1 && i<=page+1)) h += `<button class="page-btn ${page==i?'active':''}" onclick="goP(${i})">${i}</button>`;
    document.getElementById('pagCont').innerHTML = h + `<button class="page-btn" ${page==total?'disabled':''} onclick="goP(${page+1})">Next</button>`;
}

function goP(p) { page = p; renderTable(); window.scrollTo(0,0); }
window.onload = () => { view = MASTER_DATA; renderTable(); initCharts(); };
</script>
</body>
</html>
