<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCL Master Intelligence — Jan 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
<style>
:root { --cl-purple: #4F3267; --white: #FFFFFF; --green: #2D7A4F; --gold: #C9A84C; --red: #C0392B; --shadow: 0 10px 40px rgba(79, 50, 103, 0.15); }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: #F4F0F7; color: var(--cl-purple); }

.nav-tabs { display: flex; background: var(--cl-purple); justify-content: center; position: sticky; top: 0; z-index: 1000; }
.nav-tab { padding: 20px 25px; color: rgba(255,255,255,0.6); cursor: pointer; font-weight: 700; text-transform: uppercase; font-size: 11px; }
.nav-tab.active { color: var(--white); border-bottom: 4px solid var(--white); background: rgba(255,255,255,0.1); }

.main { padding: 30px; max-width: 1400px; margin: 0 auto; }
.section { display: none; }
.section.active { display: block; animation: fadeIn 0.5s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* DIAMOND SPARKLE EFFECT */
.winner-card { background: white; padding: 25px; border-radius: 16px; text-align: center; box-shadow: var(--shadow); position: relative; overflow: hidden; transition: 0.4s; border: 2px solid transparent; }
.winner-card.gold:hover { border-color: var(--gold); transform: scale(1.05); }
.winner-card.gold:hover::after { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: linear-gradient(45deg, transparent, rgba(255,255,255,0.6), transparent); transform: rotate(45deg); animation: sparkle 1.5s infinite; }
@keyframes sparkle { 0% { left: -150%; } 100% { left: 150%; } }

.chart-card { background: white; padding: 40px; border-radius: 20px; margin-bottom: 30px; box-shadow: var(--shadow); }
.btn-premium { background: var(--green); color: white; padding: 14px 24px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.3s; }
.btn-premium:hover { background: #1e5a38; transform: scale(1.02); }

/* SIMULATOR TOOL */
.sim-box { background: #FFF; padding: 20px; border-radius: 12px; margin-bottom: 30px; border: 2px dashed var(--cl-purple); display: flex; align-items: center; gap: 20px; }
</style>
</head>
<body>

<div class="nav-tabs">
    <div class="nav-tab active" onclick="switchTab(event, 'summary')">Insights</div>
    <div class="nav-tab" onclick="switchTab(event, 'winners')">Winners 🏆</div>
    <div class="nav-tab" onclick="switchTab(event, 'board')">Full Scoreboard</div>
</div>

<div class="main">
    <div id="tab-summary" class="section active">
        <div class="sim-box">
            <div style="font-weight:700;">🚀 Performance Simulator:</div>
            <input type="range" id="simRange" min="0" max="10" value="0" oninput="runSim()">
            <div id="simText">Improve bottom regions by 0%</div>
            <div id="simResult" style="margin-left:auto; font-weight:900; color:var(--green);">Projected Score: 79.2%</div>
        </div>

        <div class="chart-card"><canvas id="trendChart" height="400"></canvas></div>
        <div class="chart-card"><canvas id="distChart" height="400"></canvas></div>
    </div>

    <div id="tab-winners" class="section">
        <h2 style="margin-bottom:20px;">🥇 THE GOLD STANDARDS</h2>
        <div class="winners-grid" id="gold-winners"></div>
    </div>

    <div id="tab-board" class="section">
        <div style="display:flex; gap:15px; margin-bottom:20px;">
            <input type="text" id="sb" style="flex:1; padding:15px; border-radius:12px; border:1px solid #DDD;" placeholder="Search..." oninput="fb()">
            <button class="btn-premium" style="background:#25D366" onclick="copyWhatsApp()">📱 Copy Summary for WhatsApp</button>
            <button class="btn-premium" onclick="exportCSV()">📥 Export Excel</button>
        </div>
        <div style="background:white; border-radius:16px; overflow:hidden; box-shadow:var(--shadow);">
            <table><thead><tr><th>Rank</th><th>Store</th><th>Region</th><th>Score</th><th>Status</th></tr></thead><tbody id="bb"></tbody></table>
        </div>
    </div>
</div>

<script>
Chart.register(ChartDataLabels);

const MASTER_DATA = [
    ["CFKNGDSR","KNGDSR","Kangra-Dharamshala","NPJK",100],
    ["CFKTNJBR","KTNJBR","KTN-Jabalpur Road","WMP",100],
    ["CFGZBIAM","GZBIAM","GZB-Indirapuram","NNCR2",100],
    ["CLMUMMLD","MUMMLD","MUM-Mulund","WMUM1",99],
    ["CFGYASWP","GYASWP","GYA - SWARAJPURI ","EBJ",74]
];

function switchTab(e, id) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-'+id).classList.add('active');
    e.target.classList.add('active');
    if(id === 'summary') initCharts();
}

function runSim() {
    const val = document.getElementById('simRange').value;
    document.getElementById('simText').innerText = `Improve bottom regions by ${val}%`;
    const newScore = (79.2 + (val * 0.4)).toFixed(1);
    document.getElementById('simResult').innerText = `Projected Score: ${newScore}%`;
}

function copyWhatsApp() {
    const text = `🚀 *CCL Jan '26 Update*\n🏆 Top Region: SAP (93)\n📊 National Avg: 79.2%\n⭐ Gold Winners: 4\n\nFull details: ${window.location.href}`;
    navigator.clipboard.writeText(text);
    alert("WhatsApp Summary Copied to Clipboard!");
}

function rb() {
    const gold = MASTER_DATA.filter(s => s[4] >= 100);
    document.getElementById('gold-winners').innerHTML = gold.map(s => `
        <div class="winner-card gold"><strong>${s[2]}</strong><br><small>${s[3]}</small><div style="font-size:24px; font-weight:900; margin-top:10px;">${s[4]}%</div></div>
    `).join('');
    document.getElementById('bb').innerHTML = MASTER_DATA.map((s,i) => `<tr><td>${i+1}</td><td>${s[2]}</td><td>${s[3]}</td><td>${s[4]}</td><td>${s[4]>=95?'WINNER':'ELIGIBLE'}</td></tr>`).join('');
}

function initCharts() {
    const opts = { responsive:true, maintainAspectRatio:false, layout:{padding:{top:50}}, plugins:{datalabels:{display:true, color:'#4F3267', font:{weight:'bold'}, align:'top', anchor:'end'}} };
    new Chart(document.getElementById('trendChart'), { type:'line', data:{ labels:['SAP','EBJ','EOC','NPJK'], datasets:[{label:'Jan Score', data:[93,87,87,85], borderColor:'#4F3267', tension:0.3}] }, options:opts });
    new Chart(document.getElementById('distChart'), { type:'bar', data:{ labels:['>90%','80-89%','70-79%','<60%'], datasets:[{label:'% Stores', data:[29,25,21,12], backgroundColor:'#4F3267', barThickness:50}] }, options:{...opts, scales:{y:{suggestedMax:40}}} });
}

window.onload = () => { rb(); initCharts(); };
</script>
</body>
</html>
