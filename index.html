<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CaratLane Champions League 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;0,800;1,300&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
:root{
  --mag:#C8005A;--mag-lt:#F0006E;--mag-dk:#8A003E;
  --mag-pale:#FFF0F6;--mag-mist:rgba(200,0,90,.06);--mag-glow:rgba(200,0,90,.22);
  --gold:#B8860B;--gold-lt:#E8B840;
  --ink:#0F0A10;--ink2:#1E0E1A;
  --body:#FAFAF8;--surface:#FFFFFF;--surface2:#FDF5F9;
  --bdr:#EEE4EC;--bdr2:#E0CCD8;
  --txt:#1A0818;--txt2:#5A3048;--txt3:#9A7085;--txt4:#C4A8B8;
  --green:#0F7B4B;--green-bg:#EDFAF3;--green-br:#6EE7B7;
  --red:#BE123C;--red-bg:#FFF1F4;--red-br:#FCA5A5;
  --t-sol:#B8860B;--t-sol-bg:#FFFBEE;--t-sol-br:#E8C840;
  --t-dia:#0284C7;--t-dia-bg:#EFF9FF;--t-dia-br:#7DD3FC;
  --t-gld:#D97706;--t-gld-bg:#FFFBF0;--t-gld-br:#FCD34D;
  --t-slv:#64748B;--t-slv-bg:#F8FAFC;--t-slv-br:#CBD5E1;
  --t-cop:#C2410C;--t-cop-bg:#FFF7ED;--t-cop-br:#FCA587;
  --sh-sm:0 2px 8px rgba(15,10,16,.08),0 1px 3px rgba(15,10,16,.05);
  --sh-md:0 4px 16px rgba(15,10,16,.10),0 2px 6px rgba(15,10,16,.06);
  --sh-lg:0 8px 32px rgba(15,10,16,.14),0 4px 12px rgba(15,10,16,.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--body);color:var(--txt);-webkit-font-smoothing:antialiased;}

/* HERO */
.hero{background:linear-gradient(180deg,#fff 0%,#FFF8FB 55%,#FFF3F8 100%);padding:0;text-align:center;position:relative;overflow:hidden;}
.hero-bg{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 120% 90% at 50% -5%,rgba(200,0,90,.09) 0%,transparent 55%),radial-gradient(ellipse 55% 45% at 5% 95%,rgba(184,134,11,.07) 0%,transparent 60%),radial-gradient(ellipse 55% 45% at 95% 95%,rgba(200,0,90,.05) 0%,transparent 60%);}
.hero-grid{position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(rgba(200,0,90,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(200,0,90,.04) 1px,transparent 1px);background-size:64px 64px;mask-image:radial-gradient(ellipse 75% 65% at 50% 50%,black 20%,transparent 100%);}
.hero-scan{position:absolute;left:0;right:0;height:200px;pointer-events:none;background:linear-gradient(180deg,transparent 0%,rgba(200,0,90,.04) 40%,rgba(200,0,90,.07) 50%,rgba(200,0,90,.04) 60%,transparent 100%);animation:scan 9s ease-in-out infinite;}
@keyframes scan{0%{top:-200px}100%{top:calc(100% + 200px)}}
.hero-inner{position:relative;z-index:1;padding:56px 48px 50px;}
.hero-topbar{display:flex;align-items:center;justify-content:center;gap:0;margin-bottom:32px;width:280px;margin-left:auto;margin-right:auto;}
.htb-seg{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(200,0,90,.22),transparent);}
.htb-dot{width:6px;height:6px;border-radius:50%;background:var(--mag);box-shadow:0 0 10px var(--mag-glow);animation:htbp 2s ease-in-out infinite;flex-shrink:0;}
@keyframes htbp{0%,100%{box-shadow:0 0 6px var(--mag-glow)}50%{box-shadow:0 0 16px var(--mag-glow),0 0 28px rgba(200,0,90,.15)}}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(64px,10vw,128px);font-weight:800;letter-spacing:-2px;line-height:.88;color:var(--ink);opacity:0;animation:up .9s ease .18s forwards;position:relative;display:inline-block;}
.hero-title::after{content:'';position:absolute;bottom:-8px;left:10%;right:10%;height:3px;background:linear-gradient(90deg,transparent,var(--mag),var(--gold-lt),var(--mag),transparent);background-size:200% 100%;animation:shimmer 3.2s linear infinite;border-radius:2px;}
@keyframes shimmer{0%{background-position:0%}100%{background-position:200%}}
@keyframes up{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.hero-cl{font-family:'Cormorant Garamond',serif;font-size:clamp(15px,2.2vw,26px);font-weight:300;letter-spacing:clamp(7px,2vw,20px);text-transform:uppercase;color:var(--mag);margin-top:20px;opacity:0;animation:up .9s ease .33s forwards;}
.hero-div{display:flex;align-items:center;justify-content:center;gap:14px;margin:28px auto 20px;opacity:0;animation:up .9s ease .48s forwards;}
.hdiv-line{width:72px;height:1px;background:linear-gradient(90deg,transparent,rgba(184,134,11,.42));}
.hdiv-line.r{background:linear-gradient(270deg,transparent,rgba(184,134,11,.42));}
.hdiv-gems{display:flex;align-items:center;gap:5px;}
.hdiv-gem{width:6px;height:6px;transform:rotate(45deg);background:var(--gold);box-shadow:0 0 10px rgba(184,134,11,.5);animation:gpulse 2.2s ease-in-out infinite;}
.hdiv-gem.sm{width:3px;height:3px;background:var(--mag);box-shadow:0 0 6px var(--mag-glow);animation-delay:.6s;}
@keyframes gpulse{0%,100%{box-shadow:0 0 8px rgba(184,134,11,.5);}50%{box-shadow:0 0 18px rgba(184,134,11,.5),0 0 34px rgba(184,134,11,.18);}}
.hero-tata{display:inline-flex;align-items:center;gap:10px;font-size:9.5px;font-weight:600;letter-spacing:4.5px;text-transform:uppercase;color:var(--txt3);opacity:0;animation:up .9s ease .6s forwards;}
.tata-ln{width:22px;height:1px;background:var(--bdr2);}
.hero-year{display:inline-flex;align-items:center;gap:8px;margin-top:20px;padding:7px 22px;border:1.5px solid var(--bdr2);border-radius:30px;font-size:9px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--txt3);background:rgba(255,255,255,.85);box-shadow:var(--sh-sm);opacity:0;animation:up .9s ease .72s forwards;}
.hero-border{position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent 0%,var(--mag-dk) 10%,var(--mag) 28%,var(--gold-lt) 50%,var(--mag) 72%,var(--mag-dk) 90%,transparent 100%);background-size:200% 100%;animation:shimmer 3.5s linear infinite;}
/* KPI STRIP */
.kpi-strip{display:grid;grid-template-columns:repeat(3,1fr);background:var(--surface);border-bottom:1.5px solid var(--bdr);box-shadow:var(--sh-sm);position:relative;z-index:2;}
@media(max-width:600px){.kpi-strip{grid-template-columns:1fr;}}
.kpi{padding:38px 20px 34px;text-align:center;border-right:1.5px solid var(--bdr);position:relative;overflow:hidden;transition:background .25s;}
.kpi:last-child{border-right:none;}
.kpi::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .3s;pointer-events:none;}
.kpi:nth-child(1)::before{background:radial-gradient(ellipse 100% 80% at 50% 115%,var(--green-bg),transparent 70%);}
.kpi:nth-child(2)::before{background:radial-gradient(ellipse 100% 80% at 50% 115%,var(--mag-pale),transparent 70%);}
.kpi:nth-child(3)::before{background:radial-gradient(ellipse 100% 80% at 50% 115%,var(--red-bg),transparent 70%);}
.kpi:hover::before{opacity:1;}
.kpi-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-bottom:10px;}
.kpi-val{font-family:'Cormorant Garamond',serif;font-size:clamp(40px,5.5vw,68px);font-weight:700;line-height:1;margin-bottom:8px;display:block;transition:letter-spacing .3s;}
.kpi:hover .kpi-val{letter-spacing:.5px;}
.kpi-lbl{display:flex;align-items:center;justify-content:center;gap:7px;font-size:8.5px;font-weight:700;letter-spacing:3.5px;text-transform:uppercase;color:var(--txt3);margin-bottom:14px;}
.kpi-sub{font-size:11px;color:var(--txt3);font-weight:500;}

/* CONTAINER */
.container{max-width:1380px;margin:0 auto;padding:40px 36px;}
@media(max-width:700px){.container{padding:24px 16px;}}
.sec-hd{margin-bottom:28px;}
.sec-ey{font-size:8.5px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--mag);margin-bottom:7px;display:flex;align-items:center;gap:10px;}
.sec-ey::before{content:'';width:20px;height:1.5px;background:var(--mag);border-radius:2px;flex-shrink:0;}
.sec-ttl{font-family:'Cormorant Garamond',serif;font-size:clamp(22px,2.8vw,34px);font-weight:700;color:var(--ink);}
.sec-sub{font-size:13px;color:var(--txt3);margin-top:4px;}

/* MONTHS */
.months-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:14px;margin-bottom:48px;}
.month-card{background:var(--surface);border:1.5px solid var(--bdr);border-radius:18px;padding:24px 20px 20px;position:relative;overflow:hidden;transition:transform .22s cubic-bezier(.34,1.56,.64,1),box-shadow .22s,border-color .2s;}
.month-card.live{cursor:pointer;border-color:rgba(200,0,90,.25);}
.month-card.live::before{content:'';position:absolute;top:0;left:0;right:0;height:2.5px;background:linear-gradient(90deg,var(--mag),var(--gold-lt),var(--mag));background-size:200%;animation:shimmer 3s linear infinite;}
.month-card.live:hover{transform:translateY(-8px) scale(1.015);box-shadow:var(--sh-lg),0 8px 28px var(--mag-glow);border-color:var(--mag);}
.month-card.locked{opacity:.32;}
.month-num{font-size:8.5px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--txt4);margin-bottom:8px;}
.month-name{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:700;color:var(--ink);margin-bottom:14px;}
.month-score{font-family:'Cormorant Garamond',serif;font-size:44px;font-weight:700;color:var(--mag);line-height:1;margin-bottom:4px;}
.month-score-lbl{font-size:8.5px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--txt3);}
.live-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;background:var(--mag);color:#fff;border-radius:20px;font-size:8.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;animation:bpulse 2.5s ease-in-out infinite;}
@keyframes bpulse{0%,100%{box-shadow:0 0 0 0 var(--mag-glow)}50%{box-shadow:0 0 0 6px rgba(200,0,90,0)}}
.live-dot{width:5px;height:5px;border-radius:50%;background:#fff;animation:dpulse 1.2s ease-in-out infinite;}
@keyframes dpulse{0%,100%{opacity:1}50%{opacity:.3}}
.month-cta{display:flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;color:var(--mag);margin-top:14px;transition:gap .2s;}
.month-card.live:hover .month-cta{gap:10px;}
.month-pending{font-size:12px;color:var(--txt4);font-style:italic;margin-top:14px;}

/* REGION TABLE */
.region-panel{background:var(--surface);border:1.5px solid var(--bdr);border-radius:22px;overflow:hidden;box-shadow:var(--sh-md);margin-bottom:48px;}
.region-head{background:var(--ink2);padding:20px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.rh-ttl{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:#fff;}
.rh-sub{font-size:11px;color:rgba(255,200,220,.4);margin-top:2px;}
.rh-meta{font-size:11px;color:rgba(255,200,220,.35);}
.col-hd{display:grid;padding:12px 20px 12px 28px;border-bottom:1.5px solid var(--bdr);background:var(--body);}
.col-hd span{font-size:8.5px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--txt3);}
.region-row{position:relative;border-bottom:1.5px solid var(--bdr);}
.region-row:last-child{border-bottom:none;}
.region-row::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--mag);transform:scaleY(0);transition:transform .2s;}
.region-row:hover::before,.region-row.open::before{transform:scaleY(1);}
.region-row:hover .rrow-main,.region-row.open .rrow-main{background:var(--mag-mist);}
.rrow-main{display:grid;align-items:center;padding:15px 20px 15px 28px;cursor:pointer;transition:background .15s;}
.reg-code{font-size:12px;font-weight:700;color:var(--ink);}
.reg-score{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:600;color:var(--ink);}
.reg-badge{display:inline-flex;padding:3px 9px;border-radius:20px;font-size:10.5px;font-weight:700;}
.chevron{width:26px;height:26px;border-radius:8px;background:rgba(200,0,90,.08);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--mag);transition:transform .22s;justify-self:end;}
.region-row.open .chevron{transform:rotate(90deg);}
.region-drawer{display:none;border-top:1.5px solid var(--bdr);background:var(--surface2);padding:20px 28px 24px;animation:sdwn .2s ease;}
@keyframes sdwn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
.region-row.open .region-drawer{display:block;}
.drawer-stats{display:grid;gap:0;border:1.5px solid var(--bdr);border-radius:14px;overflow:hidden;background:var(--surface);margin-bottom:16px;}
.ds{padding:14px 16px;text-align:center;}
.ds:not(:last-child){border-right:1.5px solid var(--bdr);}
.ds-val{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;color:var(--ink);line-height:1;}
.ds-lbl{font-size:8.5px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--txt3);margin-top:4px;}
.store-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:9px;max-height:340px;overflow-y:auto;}
.store-grid::-webkit-scrollbar{width:4px;}
.store-grid::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:3px;}
.sc{display:flex;align-items:center;gap:11px;padding:11px 13px;background:var(--surface);border:1.5px solid var(--bdr);border-radius:11px;transition:all .15s;}
.sc:hover{background:var(--mag-pale);border-color:rgba(200,0,90,.3);transform:translateX(2px);}
.sc-rank{font-size:10px;font-weight:700;color:var(--txt3);min-width:20px;}
.sc-name{font-size:12.5px;font-weight:600;color:var(--ink);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sc-score{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;flex-shrink:0;}
.tsol{color:var(--t-sol)}.tdia{color:var(--t-dia)}.tgld{color:var(--t-gld)}.tslv{color:var(--t-slv)}.tcop{color:var(--t-cop)}

/* VIEWER */
.viewer{display:none;position:fixed;inset:0;z-index:9999;background:rgba(15,10,16,.95);backdrop-filter:blur(16px);flex-direction:column;}
.viewer.show{display:flex;animation:vfade .2s ease;}
@keyframes vfade{from{opacity:0}to{opacity:1}}
.viewer-bar{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;flex-shrink:0;}
.viewer-ttl{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:var(--gold-lt);}
.viewer-close{width:38px;height:38px;border-radius:10px;background:rgba(200,0,90,.15);border:1.5px solid rgba(200,0,90,.3);color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.viewer-close:hover{background:var(--mag);box-shadow:0 4px 16px var(--mag-glow);}
.viewer iframe{flex:1;border:none;border-radius:14px 14px 0 0;margin:0 14px;}

/* LOADING */
.loading{text-align:center;padding:60px 20px;color:var(--txt3);font-size:13px;}
.spinner{width:32px;height:32px;border:3px solid var(--bdr);border-top-color:var(--mag);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-bg"></div>
  <div class="hero-grid"></div>
  <canvas id="heroCanvas" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;opacity:.4;z-index:0;"></canvas>
  <div class="hero-scan"></div>
  <div class="hero-inner">
    <div class="hero-topbar">
      <div class="htb-seg"></div><div class="htb-dot"></div>
      <div class="htb-seg"></div><div class="htb-dot"></div>
      <div class="htb-seg"></div>
    </div>
    <h1 class="hero-title">CaratLane</h1>
    <div class="hero-cl">Champions&thinsp;League</div>
    <div class="hero-div">
      <div class="hdiv-line"></div>
      <div class="hdiv-gems">
        <div class="hdiv-gem sm"></div>
        <div class="hdiv-gem"></div>
        <div class="hdiv-gem sm"></div>
      </div>
      <div class="hdiv-line r"></div>
    </div>
    <div class="hero-tata"><div class="tata-ln"></div>A Tata Product<div class="tata-ln"></div></div>
    <div class="hero-year">&#10022;&thinsp;Season 2026&thinsp;&#10022;</div>
  </div>
  <div class="hero-border"></div>
</div>
<div class="kpi-strip" id="kpiStrip">
  <div style="grid-column:1/-1;padding:40px;text-align:center;"><div class="spinner"></div></div>
</div>

<div class="container">
  <div class="sec-hd">
    <div class="sec-ey">Season Calendar</div>
    <div class="sec-ttl">Monthly Scoreboards</div>
    <div class="sec-sub" id="monthsSub">Loading…</div>
  </div>
  <div class="months-grid" id="monthsGrid"><div class="loading"><div class="spinner"></div></div></div>

  <div class="sec-hd">
    <div class="sec-ey">Regional Performance</div>
    <div class="sec-ttl">Region-wise Averages</div>
    <div class="sec-sub" id="regionSub">Regions auto-calculated from stores.json — updates as months are added</div>
  </div>
  <div class="region-panel" id="regionPanel"><div class="loading"><div class="spinner"></div></div></div>
</div>

<div class="viewer" id="viewer">
  <div class="viewer-bar">
    <div class="viewer-ttl" id="viewerTtl"></div>
    <button class="viewer-close" onclick="closeViewer()">✕</button>
  </div>
  <iframe id="viewerFrame" src=""></iframe>
</div>

<script>
/*
 * ══ MONTHS CONFIG ══
 * To add a month: set file:'mar-scores.json' and html:'mar-2026.html'
 * To remove: set file:null, html:null
 * The index auto-recalculates everything from stores.json + score files.
 */
const MONTHS = [
  {month:'January',  short:'Jan', num:'01', file:'jan-scores.json', html:'jan-2026.html'},
  {month:'February', short:'Feb', num:'02', file:'feb-scores.json', html:'feb-2026.html'},
  {month:'March',    short:'Mar', num:'03', file:null, html:null},
  {month:'April',    short:'Apr', num:'04', file:null, html:null},
  {month:'May',      short:'May', num:'05', file:null, html:null},
  {month:'June',     short:'Jun', num:'06', file:null, html:null},
  {month:'July',     short:'Jul', num:'07', file:null, html:null},
  {month:'August',   short:'Aug', num:'08', file:null, html:null},
  {month:'September',short:'Sep', num:'09', file:null, html:null},
  {month:'October',  short:'Oct', num:'10', file:null, html:null},
  {month:'November', short:'Nov', num:'11', file:null, html:null},
  {month:'December', short:'Dec', num:'12', file:null, html:null},
];

let STORES = {};    // code -> {name, region}
let MDATA  = {};    // file -> [{code,score,...}]

function tier(s){return s>=100?'sol':s>=95?'dia':s>=90?'gld':s>=85?'slv':'cop';}
function tcls(s){return't'+tier(s);}

async function init(){
  // Load master store map
  try {
    const res = await fetch('stores.json');
    const arr = await res.json();
    arr.forEach(s => STORES[s.code]={name:s.name,region:s.region});
  } catch(e){ console.error('stores.json failed',e); return; }

  // Load all month files in parallel, silently skip missing ones
  const live = MONTHS.filter(m=>m.file);
  const results = await Promise.all(
    live.map(m => fetch(m.file)
      .then(r=>r.ok?r.json():null)
      .then(data=>({file:m.file,data}))
      .catch(()=>({file:m.file,data:null}))
    )
  );
  results.forEach(({file,data})=>{ if(data) MDATA[file]=data; });

  renderKPIs();
  renderMonths();
  renderRegions();
}

function renderKPIs(){
  const allScores = Object.values(MDATA).flat();
  if(!allScores.length){
    document.getElementById('kpiStrip').innerHTML=`<div style="grid-column:1/-1;padding:20px;text-align:center;color:var(--txt3);font-size:13px">No data yet</div>`;
    return;
  }
  // Regional avgs across all months combined
  const rsc={};
  allScores.forEach(s=>{
    const info=STORES[s.code]; if(!info) return;
    (rsc[info.region]=rsc[info.region]||[]).push(s.score);
  });
  const avgs=Object.entries(rsc).map(([r,sc])=>[r,sc.reduce((a,b)=>a+b,0)/sc.length]).sort((a,b)=>b[1]-a[1]);
  const best=avgs[0], worst=avgs[avgs.length-1];
  const nat=(allScores.reduce((a,s)=>a+s.score,0)/allScores.length).toFixed(1);
  const liveCount=Object.keys(MDATA).length;

  document.getElementById('kpiStrip').innerHTML=`
    <div class="kpi">
      <div class="kpi-lbl"><span class="kpi-dot" style="background:var(--green);box-shadow:0 0 8px rgba(15,123,75,.4)"></span>Best Region</div>
      <span class="kpi-val" style="color:var(--green)">${best[0]}</span>
      <div class="kpi-sub">${best[1].toFixed(1)}% average</div>
    </div>
    <div class="kpi">
      <div class="kpi-lbl"><span class="kpi-dot" style="background:var(--mag);box-shadow:0 0 8px var(--mag-glow)"></span>National Average</div>
      <span class="kpi-val" style="color:var(--mag)">${nat}%</span>
      <div class="kpi-sub">${liveCount} month${liveCount!==1?'s':''} of data</div>
    </div>
    <div class="kpi">
      <div class="kpi-lbl"><span class="kpi-dot" style="background:var(--red);box-shadow:0 0 8px rgba(190,18,60,.4)"></span>Needs Attention</div>
      <span class="kpi-val" style="color:var(--red)">${worst[0]}</span>
      <div class="kpi-sub">${worst[1].toFixed(1)}% average</div>
    </div>`;
}

function renderMonths(){
  const liveCount=MONTHS.filter(m=>m.file&&MDATA[m.file]).length;
  document.getElementById('monthsSub').textContent=
    `${liveCount} month${liveCount!==1?'s':''} live · ${12-liveCount} pending — add a score file to auto-unlock`;

  document.getElementById('monthsGrid').innerHTML=MONTHS.map(m=>{
    const data=m.file?MDATA[m.file]:null;
    if(!data) return `<div class="month-card locked">
      <div class="month-num">Month ${m.num}</div>
      <div class="month-name">${m.month}</div>
      <div class="month-pending">Data pending</div>
    </div>`;
    const avg=(data.reduce((a,s)=>a+s.score,0)/data.length).toFixed(1);
    return `<div class="month-card live" onclick="${m.html?`openViewer('${m.html}','${m.month} 2026')`:''}">
      <div class="live-badge"><span class="live-dot"></span>Live</div>
      <div class="month-num">Month ${m.num}</div>
      <div class="month-name">${m.month}</div>
      <div class="month-score">${avg}%</div>
      <div class="month-score-lbl">National Average</div>
      ${m.html?`<div class="month-cta">View Report <span>→</span></div>`:''}
    </div>`;
  }).join('');
}

function renderRegions(){
  // Aggregate scores per region per month
  const liveMonths=MONTHS.filter(m=>m.file&&MDATA[m.file]);
  const rdata={};

  liveMonths.forEach(m=>{
    MDATA[m.file].forEach(s=>{
      const info=STORES[s.code]; if(!info) return;
      const rg=info.region;
      if(!rdata[rg]) rdata[rg]={byMonth:{},storeTotals:{},storeCount:{}};
      (rdata[rg].byMonth[m.short]=rdata[rg].byMonth[m.short]||[]).push(s.score);
      rdata[rg].storeTotals[s.code]=(rdata[rg].storeTotals[s.code]||0)+s.score;
      rdata[rg].storeCount[s.code]=(rdata[rg].storeCount[s.code]||0)+1;
    });
  });

  const regions=Object.keys(rdata);
  if(!regions.length){
    document.getElementById('regionPanel').innerHTML='<div class="loading">No data loaded</div>';
    return;
  }

  // Compute combined avg per region
  const sorted=regions.map(rg=>{
    const all=Object.values(rdata[rg].byMonth).flat();
    return {rg, combined:all.reduce((a,b)=>a+b,0)/all.length, rd:rdata[rg]};
  }).sort((a,b)=>b.combined-a.combined);

  const topVal=sorted[0].combined, botVal=sorted[sorted.length-1].combined;
  const mCols=liveMonths.length;
  const colTPL=`90px ${liveMonths.map(()=>'1fr').join(' ')} 1fr 110px 32px`;

  let html=`
    <div class="region-head">
      <div>
        <div class="rh-ttl">Region Breakdown</div>
        <div class="rh-sub">${sorted.length} regions · remapped from stores.json · auto-updates</div>
      </div>
      <div class="rh-meta">${liveMonths.length}M data</div>
    </div>
    <div class="col-hd" style="grid-template-columns:${colTPL}">
      <span>Region</span>${liveMonths.map(m=>`<span>${m.short} '26</span>`).join('')}<span>Combined</span><span>Stores ≥90%</span><span></span>
    </div>`;

  sorted.forEach(({rg,combined,rd})=>{
    const isTop=Math.abs(combined-topVal)<.01, isBot=Math.abs(combined-botVal)<.01;
    const monthAvgs=liveMonths.map(m=>{const sc=rd.byMonth[m.short]||[];return sc.length?(sc.reduce((a,b)=>a+b,0)/sc.length):null;});
    const mCount=liveMonths.length||1;

    // per-store avg
    const storeList=Object.keys(rd.storeTotals).map(code=>({
      code, name:STORES[code]?.name||code,
      avg:rd.storeTotals[code]/(rd.storeCount[code]||1)
    })).sort((a,b)=>b.avg-a.avg);

    const above90=storeList.filter(s=>s.avg>=90).length;
    const storeTotal=storeList.length;
    const above90pct=storeTotal?above90/storeTotal*100:0;

    // badge color
    const badgeStyle=above90pct>=80?`background:var(--green-bg);color:var(--green);border:1.5px solid var(--green-br)`:
                     above90pct<40?`background:var(--red-bg);color:var(--red);border:1.5px solid var(--red-br)`:
                     `background:var(--body);color:var(--txt2);border:1.5px solid var(--bdr2)`;

    const monthScoreCells=monthAvgs.map(a=>
      a!=null?`<span class="reg-score">${a.toFixed(1)}%</span>`:`<span style="color:var(--txt4);font-size:12px">—</span>`
    ).join('');

    const drawerStatCells=`
      <div class="ds" style="grid-column:1"><div class="ds-val">${storeTotal}</div><div class="ds-lbl">Stores</div></div>
      ${liveMonths.map(m=>{const sc=rd.byMonth[m.short]||[];return`<div class="ds"><div class="ds-val">${sc.length?(sc.reduce((a,b)=>a+b,0)/sc.length).toFixed(1)+'%':'—'}</div><div class="ds-lbl">${m.short} Avg</div></div>`;}).join('')}
      <div class="ds"><div class="ds-val">${above90}</div><div class="ds-lbl">Stores ≥90%</div></div>`;

    const storeCards=storeList.map((s,i)=>
      `<div class="sc"><span class="sc-rank">#${i+1}</span><span class="sc-name" title="${s.name}">${s.name}</span><span class="sc-score ${tcls(s.avg)}">${s.avg.toFixed(1)}</span></div>`
    ).join('');

    html+=`<div class="region-row" id="rr-${rg}">
      <div class="rrow-main" style="grid-template-columns:${colTPL}" onclick="toggleReg('${rg}')">
        <span class="reg-code">${rg}</span>
        ${monthScoreCells}
        <span class="reg-score" style="${isTop?'color:var(--green)':isBot?'color:var(--red)':''}">${combined.toFixed(1)}%</span>
        <span class="reg-badge" style="${badgeStyle}">${above90}/${storeTotal}</span>
        <div class="chevron">›</div>
      </div>
      <div class="region-drawer">
        <div class="drawer-stats" style="grid-template-columns:repeat(${2+liveMonths.length},1fr)">${drawerStatCells}</div>
        <div class="store-grid">${storeCards}</div>
      </div>
    </div>`;
  });

  document.getElementById('regionPanel').innerHTML=html;
}

function toggleReg(rg){
  const row=document.getElementById('rr-'+rg);
  const open=row.classList.contains('open');
  document.querySelectorAll('.region-row.open').forEach(r=>r.classList.remove('open'));
  if(!open) row.classList.add('open');
}
function openViewer(file,title){
  document.getElementById('viewerTtl').textContent=title;
  document.getElementById('viewerFrame').src=file;
  document.getElementById('viewer').classList.add('show');
  document.body.style.overflow='hidden';
}
function closeViewer(){
  document.getElementById('viewer').classList.remove('show');
  document.getElementById('viewerFrame').src='';
  document.body.style.overflow='';
}
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeViewer(); });

// Hero particles
(function(){
  const cv=document.getElementById('heroCanvas'),cx=cv.getContext('2d');
  let W,H,ps=[];
  const C=['rgba(200,0,90,','rgba(184,134,11,','rgba(240,0,110,','rgba(232,184,64,'];
  function rsz(){W=cv.width=cv.offsetWidth;H=cv.height=cv.offsetHeight;}
  function mkp(){return{x:Math.random()*W,y:H+5,r:Math.random()*1.3+.3,vx:(Math.random()-.5)*.4,vy:-(Math.random()*.6+.3),c:C[Math.floor(Math.random()*C.length)],o:Math.random()*.4+.1};}
  function frame(){
    cx.clearRect(0,0,W,H);
    while(ps.length<75) ps.push(mkp());
    ps.forEach((p,i)=>{p.x+=p.vx;p.y+=p.vy;p.o+=Math.sin(Date.now()*.001+i)*.003;cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);cx.fillStyle=p.c+Math.max(0,Math.min(.65,p.o))+')';cx.fill();if(p.y<-8)ps[i]=mkp();});
    requestAnimationFrame(frame);
  }
  window.addEventListener('resize',rsz);rsz();frame();
})();

init();
</script>
</body>
</html>
