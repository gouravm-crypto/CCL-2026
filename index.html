<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CaratLane Champions League — Executive Hub</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --cl-purple: #4F3267; --cl-bg: #F9F7FA; --white: #FFFFFF; --gray: #6B6B6B;
  --green: #2D7A4F; --red: #C0392B; --shadow: 0 4px 20px rgba(79, 50, 103, 0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--cl-bg); color: var(--cl-purple); min-height: 100vh; }

/* HEADER */
.header { background: var(--white); padding: 25px 20px; text-align: center; border-bottom: 1px solid #EEE; box-shadow: var(--shadow); }
.logo-container svg { height: 50px; width: auto; }
.header-title { font-size: 22px; font-weight: 700; letter-spacing: 1px; color: var(--cl-purple); text-transform: uppercase; margin-top: 10px; }

.hub-body { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }

/* KPI CARDS */
.kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 40px; }
.kpi-card { background: var(--white); padding: 25px; border-radius: 12px; border-top: 5px solid var(--cl-purple); box-shadow: var(--shadow); }
.kpi-card.best { border-top-color: var(--green); }
.kpi-card.worst { border-top-color: var(--red); }
.kpi-val { font-size: 32px; font-weight: 700; margin: 5px 0; color: var(--cl-purple); }
.kpi-label { font-size: 11px; color: var(--gray); text-transform: uppercase; font-weight: 700; }

/* HEATMAP */
.section-header { font-size: 18px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
.section-header::before { content: ''; width: 4px; height: 20px; background: var(--cl-purple); border-radius: 2px; }
.table-wrap { background: var(--white); border-radius: 12px; overflow: hidden; box-shadow: var(--shadow); margin-bottom: 40px; border: 1px solid #F0EBF2; overflow-x: auto; }
table { width: 100%; border-collapse: collapse; min-width: 600px; }
th { background: #F4F0F7; color: var(--cl-purple); padding: 15px; text-align: left; font-size: 11px; text-transform: uppercase; }
td { padding: 15px; border-bottom: 1px solid #F4F0F7; font-size: 14px; }

/* MONTH CARDS */
.months-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
.month-card { background: var(--white); border-radius: 16px; padding: 25px; cursor: pointer; transition: 0.3s; box-shadow: var(--shadow); border: 1px solid transparent; }
.month-card:hover:not(.upcoming) { border-color: var(--cl-purple); transform: translateY(-5px); }
.month-card.upcoming { opacity: 0.5; cursor: not-allowed; background: #F2F0F3; }
.mc-month { font-size: 20px; font-weight: 700; margin-bottom: 10px; }

/* FULL SCREEN VIEWER */
.viewer-section { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; background: var(--cl-bg); flex-direction: column; }
.viewer-section.open { display: flex; }
.viewer-header { background: var(--cl-purple); color: var(--white); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; }
.close-btn { background: var(--white); color: var(--cl-purple); border: none; padding: 10px 20px; border-radius: 6px; font-weight: 700; cursor: pointer; }
.iframe-wrap { flex: 1; width: 100%; background: white; }
iframe { width: 100%; height: 100%; border: none; }
</style>
</head>
<body>

<div class="header">
  <div class="logo-container">
    <svg width="300" height="60" viewBox="0 0 300 60">
        <text x="50" y="35" font-family="Arial" font-size="32" font-weight="bold" fill="#4F3267">CARATLANE</text>
        <text x="50" y="52" font-family="Arial" font-size="10" letter-spacing="2" fill="#4F3267">A TATA PRODUCT</text>
        <circle cx="25" cy="30" r="15" fill="#DE57E5" opacity="0.8"/>
    </svg>
  </div>
  <div class="header-title">Champions League Executive Hub</div>
</div>

<div class="hub-body">
  <div class="kpi-row">
    <div class="kpi-card best"><div class="kpi-label">🏆 Top Performing Region</div><div class="kpi-val">SAP</div><div class="kpi-label" style="color:var(--green)">Avg Score: 93.0</div></div>
    <div class="kpi-card worst"><div class="kpi-label">⚠️ Priority Focus Region</div><div class="kpi-val">ENE</div><div class="kpi-label" style="color:var(--red)">Avg Score: 77.0</div></div>
    <div class="kpi-card"><div class="kpi-label">📊 National Improvement</div><div class="kpi-val">+4.2%</div><div class="kpi-label">Month-over-Month Growth</div></div>
  </div>

  <div class="section-header">Regional Performance Heatmap</div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Region</th><th>Nov '25</th><th>Dec '25</th><th>Jan '26</th><th>Variance</th><th>Status</th></tr></thead>
      <tbody id="heatmapBody"></tbody>
    </table>
  </div>

  <div class="section-header">Monthly Scorecards</div>
  <div class="months-grid" id="monthsGrid"></div>

  <div class="viewer-section" id="viewerSection">
    <div class="viewer-header">
      <div id="viewerTitle" style="font-weight:700;">CCL Dashboard Viewer</div>
      <button class="close-btn" onclick="closeViewer()">✕ CLOSE REPORTS</button>
    </div>
    <div class="iframe-wrap"><iframe id="dashboardIframe" src=""></iframe></div>
  </div>
</div>

<script>
const REGION_DATA = [
  {r:"SAP", n:84, d:90, j:93}, {r:"EBJ", n:66, d:74, j:87},
  {r:"NPJK", n:83, d:82, j:85}, {r:"ENE", n:75, d:66, j:77},
  {r:"NUP2", n:68, d:80, j:84}, {r:"STNK", n:72, d:81, j:83}
];

const MONTHS_CONFIG = [
  { id: "jan", label: "January", file: "jan-2026.html", status: "live", score: 79 },
  { id: "feb", label: "February", file: "feb-2026.html", status: "upcoming", score: "--" },
  { id: "mar", label: "March", file: "mar-2026.html", status: "upcoming", score: "--" },
  { id: "apr", label: "April", file: "apr-2026.html", status: "upcoming", score: "--" },
  { id: "may", label: "May", file: "may-2026.html", status: "upcoming", score: "--" },
  { id: "jun", label: "June", file: "jun-2026.html", status: "upcoming", score: "--" },
  { id: "jul", label: "July", file: "jul-2026.html", status: "upcoming", score: "--" },
  { id: "aug", label: "August", file: "aug-2026.html", status: "upcoming", score: "--" },
  { id: "sep", label: "September", file: "sep-2026.html", status: "upcoming", score: "--" },
  { id: "oct", label: "October", file: "oct-2026.html", status: "upcoming", score: "--" },
  { id: "nov", label: "November", file: "nov-2026.html", status: "upcoming", score: "--" },
  { id: "dec", label: "December", file: "dec-2026.html", status: "upcoming", score: "--" }
];

function buildHeatmap() {
  document.getElementById('heatmapBody').innerHTML = REGION_DATA.map(rd => {
    const varJan = (rd.j - rd.d).toFixed(1);
    const color = varJan >= 0 ? 'var(--green)' : 'var(--red)';
    return `<tr><td><strong>${rd.r}</strong></td><td>${rd.n}</td><td>${rd.d}</td><td style="font-weight:700;">${rd.j}</td>
    <td style="color:${color}; font-weight:700;">${varJan >= 0 ? '▲' : '▼'} ${Math.abs(varJan)}</td>
    <td><span style="font-size:10px; font-weight:700; color:${color}">${varJan >= 0 ? 'IMPROVING' : 'ACTION REQ'}</span></td></tr>`;
  }).join('');
}

function buildCards() {
  document.getElementById('monthsGrid').innerHTML = MONTHS_CONFIG.map(m => `
    <div class="month-card ${m.status === 'live' ? '' : 'upcoming'}" onclick="${m.status === 'live' ? `openMonth('${m.id}')` : ''}">
      <div class="mc-month">${m.label}</div>
      <div class="kpi-label">2026 PERFORMANCE</div>
      <div style="margin-top:15px; font-weight:700;">Avg Score: ${m.score}</div>
    </div>`).join('');
}

function openMonth(id) {
  const month = MONTHS_CONFIG.find(m => m.id === id);
  document.getElementById('viewerSection').classList.add('open');
  document.getElementById('dashboardIframe').src = month.file;
  document.body.style.overflow = 'hidden';
}

function closeViewer() {
  document.getElementById('viewerSection').classList.remove('open');
  document.getElementById('dashboardIframe').src = '';
  document.body.style.overflow = 'auto';
}

document.addEventListener('DOMContentLoaded', () => { buildHeatmap(); buildCards(); });
</script>
</body>
</html>
