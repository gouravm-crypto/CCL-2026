<style>
:root { --cl-purple: #4F3267; --white: #FFFFFF; --green: #2D7A4F; --gold: #C9A84C; --red: #C0392B; --shadow: 0 10px 40px rgba(79, 50, 103, 0.15); --gold-light: #FFF9E6; --green-light: #E8F5EE; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: #F9F7FA; color: var(--cl-purple); }

/* NAVIGATION */
.nav-tabs { display: flex; background: var(--cl-purple); justify-content: center; position: sticky; top: 0; z-index: 1000; overflow-x: auto; }
.nav-tab { padding: 18px 25px; color: rgba(255,255,255,0.6); cursor: pointer; font-weight: 700; text-transform: uppercase; font-size: 11px; white-space: nowrap; }
.nav-tab.active { color: var(--white); border-bottom: 3px solid var(--white); background: rgba(255,255,255,0.1); }

.main { padding: 30px; max-width: 1400px; margin: 0 auto; }
.section { display: none; }
.section.active { display: block; animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

/* PREMIUM WINNERS - GOLD & GREEN */
.winners-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-bottom: 40px; }
.winner-card { background: white; padding: 20px; border-radius: 12px; text-align: center; box-shadow: var(--shadow); position: relative; overflow: hidden; transition: 0.4s; border: 2.2px solid #EEE; }
.winner-card.gold-style { background: linear-gradient(135deg, #FFF9E6, #FFF0BC); border-color: var(--gold); }
.winner-card.green-style { background: #E8F5EE; border-color: var(--green); }
.winner-card:hover { transform: translateY(-5px); }
.winner-card.gold-style:hover::after { content: ''; position: absolute; top: -50%; left: -150%; width: 200%; height: 200%; background: linear-gradient(45deg, transparent, rgba(255,255,255,0.5), transparent); transform: rotate(45deg); animation: sparkle 1.2s infinite; }
@keyframes sparkle { 100% { left: 150%; } }

/* PAGINATION */
.table-wrap { background: white; border-radius: 15px; border: 1px solid #E6DDEB; overflow-x: auto; box-shadow: var(--shadow); margin-bottom: 20px; }
table { width: 100%; border-collapse: collapse; min-width: 1000px; }
th { background: #F4F0F7; padding: 18px; text-align: left; font-size: 10px; text-transform: uppercase; cursor: pointer; }
td { padding: 14px 18px; border-bottom: 1px solid #F4F0F7; font-size: 13px; }
.row-gold { background: #FFFDF2 !important; } .row-green { background: #F6FBFA !important; }
.pagination { display: flex; justify-content: center; align-items: center; gap: 8px; padding-bottom: 40px; }
.page-btn { padding: 8px 16px; background: white; border: 1px solid #DDD; border-radius: 6px; cursor: pointer; font-weight: 700; transition: 0.2s; }
.page-btn.active { background: var(--cl-purple); color: white; border-color: var(--cl-purple); }

/* CHART SCROLL */
.chart-scroll-wrap { width: 100%; overflow-x: auto; background: white; border-radius: 20px; box-shadow: var(--shadow); margin-bottom: 30px; padding: 20px; }
.chart-inner { min-width: 1500px; height: 450px; }
.btn-premium { background: var(--green); color: white; padding: 12px 24px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.3s; }
</style>
</head>

let page = 1; const perPage = 15; let currentView = [];

function switchTab(e, id) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-'+id).classList.add('active');
    e.target.classList.add('active');
    if(id === 'summary') setTimeout(initCharts, 150);
}

function process() {
    const gold = MASTER_DATA.filter(s => s[4] >= 100);
    const green = MASTER_DATA.filter(s => s[4] >= 95 && s[4] < 100);
    document.getElementById('gold-winners').innerHTML = gold.map(s => `<div class="winner-card gold-style"><strong>${s[2]}</strong><br><small>${s[3]}</small><div style="font-size:24px;font-weight:900;margin-top:10px;">${s[4]}%</div></div>`).join('');
    document.getElementById('green-winners').innerHTML = green.map(s => `<div class="winner-card green-style"><strong>${s[2]}</strong><br><small>${s[3]}</small><div style="font-size:24px;font-weight:900;margin-top:10px;">${s[4]}%</div></div>`).join('');
    const sorted = [...REGION_TRENDS].sort((a,b) => b.j - a.j);
    document.getElementById('bodyComp').innerHTML = sorted.map((rd, i) => {
        const v = (rd.j - rd.d).toFixed(1); const m = MASTER_DATA.filter(s => s[3] === rd.r && s[4] >= 95).length;
        return `<tr><td>${i+1}</td><td><strong>${rd.r}</strong></td><td>${rd.n}</td><td>${rd.d}</td><td>${rd.j}</td><td style="color:${v>=0?'var(--green)':'var(--red)'}">${v>=0?'▲':'▼'} ${Math.abs(v)}</td><td>${m}</td></tr>`;
    }).join('');
    currentView = MASTER_DATA.filter(s => s[9]); renderTable();
}

function renderTable() {
    const start = (page - 1) * perPage; const pagedData = currentView.slice(start, start + perPage);
    document.getElementById('bb').innerHTML = pagedData.map((s,i) => `
        <tr class="${s[4]>=100?'row-gold':(s[4]>=95?'row-green':'')}">
            <td>${start+i+1}</td><td><strong>${s[2]}</strong></td><td>${s[3]}</td><td>${s[4]}</td><td>${s[5]}</td><td>${s[6]}</td><td>${s[7]}</td><td>${s[8]??'NA'}</td><td>${s[4]>=95?'🏆 WINNER':'ELIGIBLE'}</td>
        </tr>`).join('');
    renderPagination();
}

function renderPagination() {
    const totalPages = Math.ceil(currentView.length / perPage);
    let html = `<button class="page-btn" ${page===1?'disabled':''} onclick="changePage(${page-1})">Prev</button>`;
    for(let i=1; i<=totalPages; i++) {
        if(i===1 || i===totalPages || (i >= page-1 && i <= page+1)) {
            html += `<button class="page-btn ${page===i?'active':''}" onclick="changePage(${i})">${i}</button>`;
        } else if (i === page-2 || i === page+2) { html += `<span>...</span>`; }
    }
    html += `<button class="page-btn" ${page===totalPages?'disabled':''} onclick="changePage(${page+1})">Next</button>`;
    document.getElementById('pagControls').innerHTML = html;
}

function changePage(p) { page = p; renderTable(); }
