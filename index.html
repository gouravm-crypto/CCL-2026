<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CaratLane Champions League — Results Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C9A84C; --gold-light: #F0D080; --dark: #1A1208;
  --dark2: #2C1F0A; --green: #2D7A4F; --border: #E8DCC8;
  --bg: #FDFAF4; --white: #FFFFFF; --gray: #6B6B6B;
  --shadow: 0 4px 24px rgba(26,18,8,0.10);
  --shadow-lg: 0 12px 48px rgba(26,18,8,0.18);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--dark); min-height: 100vh; -webkit-font-smoothing: antialiased; }

/* HEADER */
.header { background: linear-gradient(135deg, #1A1208 0%, #2C1F0A 60%, #3D2B0F 100%); padding: 40px 24px; text-align: center; position: relative; overflow: hidden; }
.header::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
.logo-caratlane { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 900; color: var(--gold-light); letter-spacing: 3px; text-transform: uppercase; }
.header-title { font-family: 'Playfair Display', serif; font-size: 28px; color: var(--gold-light); margin-top: 10px; }
.gold-divider { width: 100px; height: 2px; background: var(--gold); margin: 20px auto 0; }

/* HUB BODY */
.hub-body { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }
.months-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-bottom: 40px; }

.month-card { background: var(--white); border: 1.5px solid var(--border); border-radius: 16px; padding: 25px; cursor: pointer; transition: 0.3s ease; box-shadow: var(--shadow); position: relative; }
.month-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-lg); border-color: var(--gold); }
.month-card.active { border-color: var(--gold); background: #FFFDF5; }

.mc-month { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; margin-bottom: 5px; }
.mc-badge { position: absolute; top: 20px; right: 20px; padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: 800; text-transform: uppercase; background: #D4EDDA; color: var(--green); }

.mc-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; border-top: 1px solid #EEE; padding-top: 20px; }
.mc-stat-num { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 900; color: var(--dark); }
.mc-stat-label { font-size: 10px; color: var(--gray); text-transform: uppercase; font-weight: 700; margin-top: 4px; }

/* VIEWERS */
.viewer-section { display: none; margin-top: 40px; }
.viewer-section.open { display: block; }
.viewer-header { background: var(--dark); color: var(--gold-light); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-radius: 12px 12px 0 0; }
.close-btn { background: var(--gold); color: var(--dark); border: none; padding: 8px 16px; border-radius: 6px; font-weight: 700; cursor: pointer; }
.iframe-wrap { border: 2px solid var(--dark); border-top: none; border-radius: 0 0 12px 12px; background: white; height: 85vh; }
iframe { width: 100%; height: 100%; border: none; }
</style>
</head>
<body>

<div class="header">
  <div class="logo-caratlane">CARATLANE</div>
  <div class="header-title">Champions League Results Hub 🏆</div>
  <div class="gold-divider"></div>
</div>

<div class="hub-body">
  <div class="months-grid" id="monthsGrid"></div>

  <div class="viewer-section" id="viewerSection">
    <div class="viewer-header">
      <div id="viewerTitle" style="font-family:'Playfair Display'; font-weight:700;">CCL Dashboard</div>
      <button class="close-btn" onclick="closeViewer()">✕ Close Dashboard</button>
    </div>
    <div class="iframe-wrap">
      <iframe id="dashboardIframe" src=""></iframe>
    </div>
  </div>
</div>

<script>
const MONTHS_CONFIG = [
  {
    id: "jan-2026",
    label: "January",
    year: "2026",
    file: "jan-2026.html", // MAKE SURE YOUR FILE IS NAMED jan-2026.html
    nationalScore: 79,
    gold: 4,
    green: 34,
    releaseDate: "01 Mar 2026"
  }
];

function buildCards() {
  const grid = document.getElementById('monthsGrid');
  grid.innerHTML = MONTHS_CONFIG.map(m => `
    <div class="month-card" id="card-${m.id}" onclick="openMonth('${m.id}')">
      <div class="mc-badge">✅ Live</div>
      <div class="mc-month">${m.label}</div>
      <div style="font-size:12px; color:var(--gray);">${m.year} Results</div>
      <div class="mc-stats">
        <div class="mc-stat"><div class="mc-stat-num">${m.nationalScore}</div><div class="mc-stat-label">Nat'l Score</div></div>
        <div class="mc-stat"><div class="mc-stat-num" style="color:var(--green)">${m.gold+m.green}</div><div class="mc-stat-label">Winners</div></div>
      </div>
      <div style="font-size:10px; color:var(--gray); text-align:right;">Released: ${m.releaseDate}</div>
    </div>
  `).join('');
}

function openMonth(id) {
  const month = MONTHS_CONFIG.find(m => m.id === id);
  document.getElementById('viewerSection').classList.add('open');
  document.getElementById('viewerTitle').textContent = `CCL ${month.label} ${month.year} Performance Reports`;
  document.getElementById('dashboardIframe').src = month.file;
  window.scrollTo({ top: document.getElementById('viewerSection').offsetTop - 20, behavior: 'smooth' });
}

function closeViewer() {
  document.getElementById('viewerSection').classList.remove('open');
  document.getElementById('dashboardIframe').src = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

document.addEventListener('DOMContentLoaded', buildCards);
</script>
</body>
</html>
